  <polygon points="110,104 64,90 64,120 108,122" fill="#639e4e"/>
  <polygon points="20,122 64,120 64,144 58,150 26,150" fill="#a9d195"/>
  <polygon points="108,122 64,120 64,144 70,150 102,150" fill="#588f45"/>
