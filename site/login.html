<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in — KashikeyoPOS</title>
<link rel="icon" href="/icon-192.png" />
<style>
  :root {
    --app: #F3ECE1; --panel: #FFFFFF; --border: #E8DFCF; --text: #2A241E;
    --sub: #8A8074; --faint: #B7AE9F; --primary: #C1502D; --primary-hov: #AA4526;
    --input: #FFFFFF; --btn: #F1E8D8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--app); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 24px;
  }
  .card {
    width: 100%; max-width: 380px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px 28px; box-shadow: 0 8px 30px rgba(42,36,30,.08);
  }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
  .logo-mark {
    width: 36px; height: 36px; border-radius: 10px; background: var(--primary);
    display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 16px;
  }
  .logo-text { font-weight: 700; font-size: 17px; letter-spacing: -.01em; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.sub { color: var(--sub); font-size: 14px; margin: 0 0 24px; }
  label { display: block; font-size: 13px; color: var(--sub); margin: 16px 0 6px; }
  input {
    width: 100%; padding: 11px 13px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--input); color: var(--text); font-size: 15px; outline: none;
  }
  input:focus { border-color: var(--primary); }
  button {
    width: 100%; margin-top: 24px; padding: 12px; border-radius: 10px; border: none;
    background: var(--primary); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  button:hover { background: var(--primary-hov); }
  button:disabled { opacity: .6; cursor: default; }
  .error {
    display: none; margin-top: 16px; padding: 10px 12px; border-radius: 8px;
    background: #FBEAE4; color: #A3391F; font-size: 13px;
  }
  .foot { margin-top: 20px; text-align: center; font-size: 13px; color: var(--sub); }
  .foot a { color: var(--primary); text-decoration: none; font-weight: 600; }
  .foot a:hover { text-decoration: underline; }
  .back { display: inline-block; margin-bottom: 18px; color: var(--sub); text-decoration: none; font-size: 13px; }
  .back:hover { color: var(--text); }

  #oauthBox { display: none; gap: 10px; margin-bottom: 4px; }
  #googleBtn { display: flex; justify-content: center; }
  #googleBtn > div { width: 100% !important; }
  .oauth-btn {
    display: none; align-items: center; justify-content: center; gap: 8px; width: 100%;
    padding: 10px; border-radius: 999px; border: 1px solid #000; background: #000; color: #fff;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .oauth-btn:hover { background: #1a1a1a; }
  .oauth-btn svg { width: 16px; height: 16px; flex: none; }
  .divider { display: none; align-items: center; gap: 10px; margin: 18px 0; color: var(--faint); font-size: 12px; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
</style>
</head>
<body>
  <div class="card">
    <a class="back" href="/">&larr; kashikeyopos.com</a>
    <div class="logo">
      <div class="logo-mark">K</div>
      <div class="logo-text">KashikeyoPOS</div>
    </div>
    <h1>Sign in</h1>
    <p class="sub">Welcome back — sign in to your workspace.</p>

    <div id="oauthBox">
      <div id="googleBtn"></div>
      <button type="button" id="appleBtn" class="oauth-btn">
        <svg viewBox="0 0 384 512" fill="#fff"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141 4 184.8 4 273.5c0 26.2 4.8 53.3 14.4 81.2 12.8 37.1 59 128 107.2 126.5 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-83.5 102.6-120.7-65.2-30.7-61.7-90-61.7-91.8zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.6-67.9 35.2-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.6z"/></svg>
        Continue with Apple
      </button>
    </div>
    <div class="divider" id="oauthDivider"><span>or</span></div>

    <form id="f">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" required />
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required />
      <div class="error" id="err"></div>
      <button id="submit" type="submit">Sign in</button>
    </form>
    <div class="foot">New here? <a href="/signup">Create your store</a></div>
  </div>
  <script src="/oauth.js"></script>
  <script>
    (function () {
      try {
        if (localStorage.getItem("kashikeyo-cloud")) { location.replace("/app"); return; }
      } catch (e) {}
      window.KashikeyoOAuth.init({
        boxId: "oauthBox", googleId: "googleBtn", appleId: "appleBtn", dividerId: "oauthDivider",
        onError: function (msg) { var err = document.getElementById("err"); err.textContent = msg; err.style.display = "block"; },
      });
      var form = document.getElementById("f");
      var err = document.getElementById("err");
      var btn = document.getElementById("submit");
      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        err.style.display = "none";
        btn.disabled = true;
        btn.textContent = "Signing in…";
        try {
          var res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: document.getElementById("email").value.trim(),
              password: document.getElementById("password").value,
            }),
          });
          var data = await res.json().catch(function () { return {}; });
          if (!res.ok) throw new Error(data.error || "Sign in failed");
          localStorage.setItem("kashikeyo-cloud", JSON.stringify({ url: "", token: data.token, slug: data.slug, register: data.register }));
          location.href = "/app";
        } catch (e2) {
          err.textContent = e2.message || "Something went wrong — please try again";
          err.style.display = "block";
          btn.disabled = false;
          btn.textContent = "Sign in";
        }
      });
    })();
  </script>
</body>
</html>
