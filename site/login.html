<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in — KashikeyoPOS</title>
<link rel="icon" href="/logo-mark.png" />
<style>
  :root {
    --app: #FBFAF7; --panel: #FFFFFF; --border: #E3DED4; --text: #26221C;
    --sub: #8A8378; --faint: #B8B0A3; --primary: #C7431D; --primary-hov: #A33417;
    --input: #FFFFFF; --btn: #F4F1EB;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--app); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 24px;
  }
  .card {
    width: 100%; max-width: 380px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px 28px; box-shadow: 0 8px 30px rgba(42,36,30,.08);
  }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
  .logo-img { display: block; height: 38px; width: auto; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.sub { color: var(--sub); font-size: 14px; margin: 0 0 24px; }
  label { display: block; font-size: 13px; color: var(--sub); margin: 16px 0 6px; }
  input {
    width: 100%; padding: 11px 13px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--input); color: var(--text); font-size: 15px; outline: none;
  }
  input:focus { border-color: var(--primary); }
  button {
    width: 100%; margin-top: 24px; padding: 12px; border-radius: 10px; border: none;
    background: var(--primary); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  button:hover { background: var(--primary-hov); }
  button:disabled { opacity: .6; cursor: default; }
  .error {
    display: none; margin-top: 16px; padding: 10px 12px; border-radius: 8px;
    background: #FBEAE4; color: #A3391F; font-size: 13px;
  }
  .foot { margin-top: 20px; text-align: center; font-size: 13px; color: var(--sub); }
  .foot a { color: var(--primary); text-decoration: none; font-weight: 600; }
  .foot a:hover { text-decoration: underline; }
  .back { display: inline-block; margin-bottom: 18px; color: var(--sub); text-decoration: none; font-size: 13px; }
  .back:hover { color: var(--text); }

  #oauthBox { display: none; gap: 10px; margin-bottom: 4px; }
  #googleBtn { display: flex; justify-content: center; }
  #googleBtn > div { width: 100% !important; }
  .oauth-btn {
    display: none; align-items: center; justify-content: center; gap: 8px; width: 100%;
    padding: 10px; border-radius: 999px; border: 1px solid #000; background: #000; color: #fff;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .oauth-btn:hover { background: #1a1a1a; }
  .oauth-btn svg { width: 16px; height: 16px; flex: none; }
  .divider { display: none; align-items: center; gap: 10px; margin: 18px 0; color: var(--faint); font-size: 12px; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  /* Glass treatment — match the till / back-office front-end: warm gradient
     canvas with a frosted, blurred card, gradient primary button and a soft
     input focus ring. */
  body {
    background:
      radial-gradient(1100px 620px at 12% -8%, color-mix(in srgb, var(--primary) 14%, transparent), transparent 58%),
      radial-gradient(950px 520px at 108% 4%, color-mix(in srgb, var(--primary) 9%, transparent), transparent 55%),
      var(--app);
    background-attachment: fixed;
  }
  .card {
    background: color-mix(in srgb, var(--panel) 72%, transparent);
    -webkit-backdrop-filter: blur(22px) saturate(1.4);
    backdrop-filter: blur(22px) saturate(1.4);
    border-color: color-mix(in srgb, var(--border) 60%, transparent);
    border-radius: 20px;
    box-shadow: 0 1px 2px rgba(38,34,28,.05), 0 24px 56px rgba(38,34,28,.12);
  }
  input {
    background: color-mix(in srgb, var(--input) 82%, transparent);
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus { box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 16%, transparent); }
  button {
    background: linear-gradient(180deg, color-mix(in srgb, var(--primary) 90%, #fff 10%), var(--primary));
    box-shadow: 0 3px 10px color-mix(in srgb, var(--primary) 32%, transparent);
    transition: background .15s, box-shadow .15s, transform .08s;
  }
  button:hover { background: linear-gradient(180deg, color-mix(in srgb, var(--primary) 94%, #fff 6%), var(--primary-hov)); box-shadow: 0 6px 16px color-mix(in srgb, var(--primary) 40%, transparent); }
  button:active { transform: translateY(1px); }
  .oauth-btn { box-shadow: none; }
</style>
</head>
<body>
  <div class="card">
    <a class="back" href="/">&larr; kashikeyopos.com</a>
    <div class="logo">
      <img class="logo-img" src="/logo.png" alt="KashikeyoPOS" />
    </div>
    <h1>Sign in</h1>
    <p class="sub">Welcome back — sign in to your workspace.</p>

    <div id="oauthBox">
      <div id="googleBtn"></div>
      <button type="button" id="appleBtn" class="oauth-btn">
        <svg viewBox="0 0 384 512" fill="#fff"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141 4 184.8 4 273.5c0 26.2 4.8 53.3 14.4 81.2 12.8 37.1 59 128 107.2 126.5 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-83.5 102.6-120.7-65.2-30.7-61.7-90-61.7-91.8zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.6-67.9 35.2-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.6z"/></svg>
        Continue with Apple
      </button>
    </div>
    <div class="divider" id="oauthDivider"><span>or</span></div>

    <form id="f">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" required />
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required />
      <div class="error" id="err"></div>
      <button id="submit" type="submit">Sign in</button>
    </form>
    <div class="foot" id="ownerFoot">
      <a href="#" id="toStaff">Staff sign-in with PIN</a> &middot; New here? <a href="/signup">Create your store</a>
    </div>

    <form id="staffForm" style="display:none">
      <label for="storeSlug">Store</label>
      <input id="storeSlug" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="your-store" required />
      <label for="staffPin">Your PIN</label>
      <input id="staffPin" type="password" inputmode="numeric" autocomplete="off" placeholder="4-digit PIN" required />
      <div class="error" id="staffErr"></div>
      <button id="staffSubmit" type="submit">Open back office</button>
    </form>
    <div class="foot" id="staffFoot" style="display:none">
      <a href="#" id="toOwner">&larr; Owner sign-in</a>
    </div>
  </div>
  <script src="/oauth.js"></script>
  <script>
    (function () {
      // Whether this browser is already signed in is decided server-side by
      // the session cookie (see redirectIfAppSession on GET /login) - not by
      // localStorage. Trusting a stale localStorage token here, with no valid
      // cookie, bounced the page /login->/app->/login forever.
      window.KashikeyoOAuth.init({
        boxId: "oauthBox", googleId: "googleBtn", appleId: "appleBtn", dividerId: "oauthDivider",
        onError: function (msg) { var err = document.getElementById("err"); err.textContent = msg; err.style.display = "block"; },
      });
      var form = document.getElementById("f");
      var err = document.getElementById("err");
      var btn = document.getElementById("submit");
      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        err.style.display = "none";
        btn.disabled = true;
        btn.textContent = "Signing in…";
        try {
          var res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: document.getElementById("email").value.trim(),
              password: document.getElementById("password").value,
            }),
          });
          var data = await res.json().catch(function () { return {}; });
          if (!res.ok) throw new Error(data.error || "Sign in failed");
          localStorage.setItem("kashikeyo-cloud", JSON.stringify({ url: "", token: data.token, slug: data.slug, register: data.register }));
          if (data.pin) alert("Your till PIN is " + data.pin + " - you'll use this to sign in at the till counter. You can change it anytime from Staff settings.");
          location.href = "/app";
        } catch (e2) {
          err.textContent = e2.message || "Something went wrong — please try again";
          err.style.display = "block";
          btn.disabled = false;
          btn.textContent = "Sign in";
        }
      });

      /* Staff sign-in: store slug + till PIN -> back office (managers/admins).
         Reuses the existing till PIN; the server enforces role from here on. */
      var staffForm = document.getElementById("staffForm");
      var ownerFoot = document.getElementById("ownerFoot");
      var staffFoot = document.getElementById("staffFoot");
      var staffErr = document.getElementById("staffErr");
      var staffBtn = document.getElementById("staffSubmit");
      var h1 = document.querySelector("h1"), sub = document.querySelector("p.sub");
      try {
        var qs = new URLSearchParams(location.search);
        var st = qs.get("store") || localStorage.getItem("kback-store");
        if (st) document.getElementById("storeSlug").value = st;
      } catch (e) {}
      function showStaff(on) {
        form.style.display = on ? "none" : "";
        ownerFoot.style.display = on ? "none" : "";
        staffForm.style.display = on ? "" : "none";
        staffFoot.style.display = on ? "" : "none";
        h1.textContent = on ? "Staff sign-in" : "Sign in";
        sub.textContent = on ? "Managers and admins — enter your store and till PIN." : "Welcome back — sign in to your workspace.";
      }
      document.getElementById("toStaff").addEventListener("click", function (e) { e.preventDefault(); showStaff(true); });
      document.getElementById("toOwner").addEventListener("click", function (e) { e.preventDefault(); showStaff(false); });
      staffForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        staffErr.style.display = "none";
        staffBtn.disabled = true; staffBtn.textContent = "Signing in…";
        try {
          var slug = document.getElementById("storeSlug").value.trim().toLowerCase();
          var res = await fetch("/api/back/login", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ slug: slug, pin: document.getElementById("staffPin").value }),
          });
          var data = await res.json().catch(function () { return {}; });
          if (!res.ok) throw new Error(data.error || "Sign in failed");
          try { localStorage.setItem("kback-store", slug); } catch (e3) {}
          location.href = "/back";
        } catch (e2) {
          staffErr.textContent = e2.message || "Something went wrong — please try again";
          staffErr.style.display = "block";
          staffBtn.disabled = false; staffBtn.textContent = "Open back office";
        }
      });
    })();
  </script>
</body>
</html>
