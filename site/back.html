<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Back office — KashikeyoPOS</title>
<link rel="icon" href="/logo-mark.png" />
<style>
  /* Palette vars are set by applyTheme() below — the same five fruit themes
     (light + dark) the till uses, following the till's own choice via the
     synced settings entity (ktheme/ktdark), with a local override picker. */
  :root {
    --app: #E7F1EA; --panel: #FFFFFF; --panel2: #E2F1E9; --border: #DAE7E0; --text: #16221C;
    --sub: #57645D; --faint: #646D68; --primary: #0FA968; --primary-hov: #0B8A54;
    --pill: #0C8653; --on-pill: #FFFFFF;
    --input: #FFFFFF; --btn: #E2F1E9; --btn-hov: #D4E8DE; --header: rgba(240,247,243,.92);
    --ok: #15803D; --ok-bg: #DCFCE7; --warn: #B91C1C; --warn-bg: #FEE2E2;
    --amber: #B45309; --amber-bg: #FEF3C7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--app); color: var(--text); min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    transition: background .25s, color .25s;
  }
  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header { position: sticky; top: 0; z-index: 5; background: var(--header); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
  .theme-ctl { display: flex; align-items: center; gap: 6px; }
  .theme-ctl .sw { width: 18px; height: 18px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0; }
  .theme-ctl .sw.on { border-color: var(--text); transform: scale(1.12); }
  .theme-ctl .dk { background: var(--btn); border-radius: 999px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 13px; padding: 0; }
  .till-link {
    /* a11y: filled brand pill. --pill/--on-pill are a per-theme pair computed
       to clear WCAG AA (white text where white passes; the theme's dark ink on
       the bright mango/aqua primaries; three light primaries deepened a shade). */
    display: inline-flex; align-items: center; gap: 7px; background: var(--pill); color: var(--on-pill) !important;
    padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; text-decoration: none !important;
  }
  .till-link:hover { filter: brightness(.94); box-shadow: 0 4px 12px color-mix(in srgb, var(--pill) 45%, transparent); }
  .bar { max-width: 1180px; margin: 0 auto; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-img { display: block; height: 28px; width: auto; }
  .logo-text { font-weight: 700; font-size: 15px; color: var(--sub); }

  .tabs { max-width: 1180px; margin: 0 auto; padding: 0 24px; display: flex; gap: 4px; overflow-x: auto; }
  .tabs button {
    border: none; background: none; padding: 10px 14px; font-size: 13.5px; font-weight: 600;
    color: var(--sub); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap;
  }
  .tabs button.on { color: var(--primary); border-bottom-color: var(--primary); }

  main { max-width: 1180px; margin: 0 auto; padding: 22px 24px 80px; }
  h2 { font-size: 14px; margin: 0 0 12px; color: var(--sub); text-transform: uppercase; letter-spacing: .05em; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; }
  .pad { padding: 18px; }

  button { border: none; border-radius: 9px; font-size: 13.5px; font-weight: 600; cursor: pointer; padding: 9px 14px; }
  button.primary { background: var(--primary); color: #fff; }
  button.primary:hover { background: var(--primary-hov); }
  button.primary:disabled { opacity: .55; cursor: default; }
  button.ghost { background: var(--btn); color: var(--text); }
  button.ghost:hover { background: var(--btn-hov); }
  button.tiny { padding: 4px 10px; font-size: 12px; border-radius: 7px; }

  input, select {
    padding: 9px 11px; border-radius: 9px; border: 1px solid var(--border);
    background: var(--input); color: var(--text); font-size: 14px; outline: none;
  }
  input:focus, select:focus { border-color: var(--primary); }
  input.num { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; text-align: right; }

  /* a11y: a visible keyboard-focus ring (mouse/touch users unaffected — the base
     outline:none above only bites for pointer focus; :focus-visible restores it
     for keyboard). */
  a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible,
  textarea:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 6px;
  }
  .tabs button:focus-visible { outline-offset: -2px; }
  .theme-ctl .sw:focus-visible { outline-offset: 3px; }
  /* skip link — off-screen until focused */
  .skip { position: absolute; left: 8px; top: -60px; z-index: 100; background: var(--primary);
    color: #fff; padding: 9px 16px; border-radius: 9px; font-size: 13px; font-weight: 600;
    text-decoration: none; transition: top .15s; }
  .skip:focus { top: 8px; }
  #main:focus { outline: none; }
  label { display: block; font-size: 12.5px; color: var(--sub); margin: 12px 0 5px; }

  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 9px 12px; font-size: 13px; border-bottom: 1px solid var(--border); }
  th { color: var(--sub); font-weight: 600; background: var(--panel2); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  td.mono, th.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; text-align: right; white-space: nowrap; }
  .tbl-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid var(--border); background: var(--panel); }
  .tbl-wrap table { border: none; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge.low { background: var(--warn-bg); color: var(--warn); }
  .badge.ok { background: var(--ok-bg); color: var(--ok); }
  .badge.amber { background: var(--amber-bg); color: var(--amber); }
  .badge.dim { background: var(--panel2); color: var(--sub); }
  .badge.flag { background: var(--warn-bg); color: var(--warn); }
  .tab-count { display: inline-block; min-width: 18px; padding: 0 5px; margin-left: 4px; border-radius: 999px; background: var(--warn); color: #fff; font-size: 11px; font-weight: 700; text-align: center; vertical-align: middle; }
  .flag-card { border-left: 3px solid var(--warn); }
  .flag-reasons { margin: 6px 0 0; padding-left: 18px; color: var(--warn); font-size: 13px; }
  .flag-reasons li { margin: 2px 0; }
  .num-bad { color: var(--warn); font-weight: 700; }

  .empty { padding: 18px; font-size: 13px; color: var(--sub); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .toolbar input[type=search] { min-width: 220px; }

  /* guided IA: per-tab intro line */
  .lead { display: flex; align-items: baseline; gap: 10px; margin: 0 0 18px; flex-wrap: wrap; }
  .lead h1 { font-size: 21px; margin: 0; font-weight: 700; letter-spacing: -.01em; }
  .lead p { margin: 0; font-size: 13px; color: var(--sub); }

  /* Overview cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; margin-bottom: 22px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 15px 16px; box-shadow: 0 1px 3px rgba(38,34,28,.06); }
  .card.tap { cursor: pointer; transition: transform .12s, border-color .12s; }
  .card.tap:hover { transform: translateY(-2px); border-color: var(--primary); }
  .card .k { font-size: 11.5px; color: var(--sub); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
  .card .v { font-size: 27px; font-weight: 700; margin-top: 6px; font-variant-numeric: tabular-nums; letter-spacing: -.01em; }
  .card .v small { font-size: 14px; font-weight: 600; color: var(--sub); }
  .card .n { font-size: 12px; color: var(--sub); margin-top: 3px; }
  .card.attn { border-color: color-mix(in srgb, var(--warn) 45%, transparent); }
  .card.attn .v { color: var(--warn); }
  .card.good .v { color: var(--ok); }

  /* Assistant ask box */
  .ask { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 22px; box-shadow: 0 1px 3px rgba(38,34,28,.06); }
  .ask input { padding: 11px 13px; }
  .ask-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .chip-q { font-size: 12px; padding: 6px 12px; border-radius: 999px; background: var(--panel2); color: var(--sub); border: 1px solid var(--border); }
  .chip-q:hover { border-color: var(--primary); color: var(--primary); }
  .ai-a { margin-top: 14px; background: var(--panel2); border-radius: 12px; padding: 14px 16px; font-size: 14px; line-height: 1.6; }
  .ai-a.thinking { color: var(--sub); font-style: italic; }
  .ai-a.warn { background: var(--warn-bg); color: var(--warn); }

  /* Suggested actions */
  .suggest { display: flex; flex-direction: column; gap: 8px; }
  .suggest .s { display: flex; align-items: center; gap: 12px; background: var(--panel); border: 1px solid var(--border); border-left: 4px solid var(--faint); border-radius: 12px; padding: 13px 15px; }
  .suggest .s.warn { border-left-color: var(--warn); }
  .suggest .s.amber { border-left-color: var(--amber); }
  .suggest .s.ok { border-left-color: var(--ok); }
  .suggest .s .txt { flex: 1; font-size: 13.5px; line-height: 1.45; }
  .suggest .s .txt b { font-weight: 700; }

  /* Process flow illustration */
  .flow { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 6px; margin-bottom: 8px; }
  .flow .st { flex: 1; min-width: 120px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px 13px; cursor: pointer; transition: border-color .12s; }
  .flow .st:hover, .flow .st.on { border-color: var(--primary); }
  .flow .st .ic { font-size: 19px; }
  .flow .st .nm { font-size: 12.5px; font-weight: 700; margin-top: 5px; }
  .flow .st .ar { color: var(--faint); align-self: center; font-size: 18px; }
  /* stock-history timeline rows reuse .flow/.st */
  .hist-list { display: block; gap: 8px; overflow: visible; margin: 0; }
  .hist-list .st { min-width: 0; margin-bottom: 8px; cursor: default; border-left: 4px solid var(--faint); }
  .hist-list .st.good { border-left-color: var(--ok); }
  .hist-list .st.warn { border-left-color: var(--warn); }
  .hist-list .st.amber { border-left-color: var(--amber); }
  .flow-explain { font-size: 13px; color: var(--sub); background: var(--panel2); border-radius: 10px; padding: 12px 14px; line-height: 1.5; margin-bottom: 22px; }

  /* alerts strip */
  #alerts { max-width: 1180px; margin: 0 auto; padding: 12px 24px 0; display: flex; gap: 8px; flex-wrap: wrap; }
  #alerts .chip { font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 999px; }
  #alerts .chip.low { background: var(--amber-bg); color: var(--amber); }
  #alerts .chip.review { background: var(--warn-bg); color: var(--warn); }

  /* modal */
  .overlay { position: fixed; inset: 0; z-index: 20; background: rgba(42,36,30,.45); display: flex; align-items: center; justify-content: center; padding: 18px; }
  .modal { width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 22px; }
  .modal h3 { margin: 0 0 4px; font-size: 17px; }
  .modal .sub { font-size: 12.5px; color: var(--sub); margin: 0 0 8px; }
  .modal .actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal .actions .primary { flex: 1; }

  /* recipes layout */
  .split { display: grid; grid-template-columns: 320px 1fr; gap: 16px; align-items: start; }
  @media (max-width: 820px) { .split { grid-template-columns: 1fr; } }
  .prodlist { max-height: 70vh; overflow-y: auto; }
  .prodlist .p { display: flex; align-items: center; gap: 9px; padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13.5px; }
  .prodlist .p:hover { background: var(--panel2); }
  .prodlist .p.on { background: var(--panel2); box-shadow: inset 3px 0 0 var(--primary); }
  .prodlist .p .nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .prodlist .p .pr { font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: var(--sub); }
  .margin-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; border-top: 1px solid var(--border); padding: 14px 18px; }
  .margin-bar .m .l { font-size: 11px; color: var(--sub); }
  .margin-bar .m .v { font-size: 17px; font-weight: 700; font-family: ui-monospace, Menlo, monospace; }
  .m.good .v { color: var(--ok); } .m.mid .v { color: var(--amber); } .m.bad .v { color: var(--warn); }

  /* stock check wizard */
  .steps { display: flex; gap: 6px; margin: 0 0 16px; }
  .steps i { flex: 1; height: 4px; border-radius: 2px; background: var(--border); }
  .steps i.on { background: var(--primary); }
  .diff { font-size: 11.5px; font-weight: 700; font-family: ui-monospace, Menlo, monospace; }
  .diff.zero { color: var(--faint); } .diff.up { color: var(--ok); } .diff.down { color: var(--warn); }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chips button { padding: 5px 11px; font-size: 12px; border-radius: 999px; background: var(--btn); }
  .chips button.on { background: var(--primary); color: #fff; }
  .seg { display: flex; gap: 8px; margin: 4px 0 14px; }
  .seg button { flex: 1; padding: 12px 10px; border-radius: 12px; background: var(--panel2); border: 1.5px solid var(--border); font-size: 13.5px; font-weight: 600; text-align: center; line-height: 1.35; }
  .seg button.on { border-color: var(--primary); background: color-mix(in srgb, var(--primary) 8%, var(--panel)); color: var(--primary); }
  .seg button small { display: block; font-weight: 400; color: var(--sub); font-size: 11.5px; margin-top: 2px; }
  .adj-preview { background: var(--panel2); border-radius: 12px; padding: 12px 14px; font-size: 13px; line-height: 1.6; margin-top: 14px; }
  .adj-preview b { font-weight: 700; }
  .sell-role { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 14px; }
  .sell-toggle { display: flex; align-items: flex-start; gap: 10px; font-size: 13.5px; cursor: pointer; }
  .sell-toggle input { margin-top: 3px; width: 16px; height: 16px; accent-color: var(--primary); }
  .bigstat { text-align: center; padding: 26px 18px; }
  .bigstat .n { font-size: 30px; font-weight: 800; font-family: ui-monospace, Menlo, monospace; }
  .bigstat .l { font-size: 13px; color: var(--sub); margin-top: 4px; }

  .toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); z-index: 40; background: var(--text); color: var(--app); padding: 10px 18px; border-radius: 999px; font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; max-width: 90vw; }
  .toast.show { opacity: 1; }
  .hint { font-size: 11.5px; color: var(--faint); margin-top: 4px; }
  section { margin-bottom: 30px; }

  /* open-PO cards (Deliveries tab) */
  .po-card { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .po-card:last-child { border-bottom: none; }
  .po-card .meta { flex: 1; min-width: 180px; }
  .po-card .meta b { font-size: 13.5px; }
  .po-card .meta .hint { margin-top: 2px; }
  .po-lock { font-size: 12.5px; padding: 7px 11px; border-radius: 9px; background: var(--panel2); }

  /* phones / small tablets */
  @media (max-width: 720px) {
    .bar { padding: 10px 14px; flex-wrap: wrap; row-gap: 8px; }
    .bar > div:last-child { width: 100%; justify-content: space-between; gap: 8px; }
    .till-link { padding: 7px 12px; font-size: 12px; }
    #signOut { padding: 7px 10px; font-size: 12px; }
    .theme-ctl { gap: 5px; }
    .theme-ctl .sw { width: 16px; height: 16px; }
    .tabs { padding: 0 8px; }
    main { padding: 16px 12px 90px; }
    #alerts { padding: 10px 12px 0; }
    th, td { padding: 8px 9px; font-size: 12.5px; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .toolbar > * { width: 100%; }
    .toolbar button.primary { width: 100%; }
    .row2 { grid-template-columns: 1fr; }
    .margin-bar { grid-template-columns: repeat(2, 1fr); }
    .modal { max-height: 96vh; border-radius: 14px; padding: 16px; }
    button { padding: 10px 14px; }
    input, select { padding: 10px 11px; font-size: 16px; } /* 16px stops iOS zoom-on-focus */
  }

  /* ============================================================
     Glass revamp — bring the back office in line with the till /
     guest front-end: a warm gradient canvas with frosted, blurred
     surfaces, pill tabs, softer buttons. Works across all five fruit
     themes + dark because every colour is mixed from the theme vars.
     ============================================================ */
  body {
    background:
      radial-gradient(1100px 620px at 12% -8%, color-mix(in srgb, var(--primary) 13%, transparent), transparent 58%),
      radial-gradient(950px 520px at 108% 3%, color-mix(in srgb, var(--primary) 8%, transparent), transparent 55%),
      var(--app);
    background-attachment: fixed;
  }
  /* frosted surfaces */
  .panel, .card, .ask, .tbl-wrap, .modal, .ai-a, .adj-preview, .flow-explain,
  .suggest .s, .flow .st, .po-lock, .seg button, .chip-q, .prodlist {
    background: color-mix(in srgb, var(--panel) 74%, transparent);
    -webkit-backdrop-filter: blur(14px) saturate(1.3);
    backdrop-filter: blur(14px) saturate(1.3);
  }
  .panel, .card, .ask, .tbl-wrap, .modal {
    border-radius: 16px;
    border-color: color-mix(in srgb, var(--border) 62%, transparent);
    box-shadow: 0 1px 2px rgba(38,34,28,.05), 0 14px 34px rgba(38,34,28,.07);
  }
  .card.tap { transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease; }
  .card.tap:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(38,34,28,.10), 0 22px 46px rgba(38,34,28,.10); }
  .modal { box-shadow: 0 20px 60px rgba(38,34,28,.28); }
  .overlay { background: color-mix(in srgb, var(--text) 42%, transparent); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px); }

  header {
    background: color-mix(in srgb, var(--header) 80%, transparent);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    backdrop-filter: blur(20px) saturate(1.4);
    border-bottom-color: color-mix(in srgb, var(--border) 55%, transparent);
  }

  /* pill tabs */
  .tabs { gap: 6px; padding-top: 4px; padding-bottom: 8px; }
  .tabs button {
    border-radius: 999px; border-bottom: none; padding: 8px 15px;
    background: color-mix(in srgb, var(--panel) 52%, transparent);
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    border: 1px solid color-mix(in srgb, var(--border) 55%, transparent);
    transition: background .15s, color .15s, box-shadow .15s, border-color .15s;
  }
  .tabs button:hover { color: var(--text); border-color: color-mix(in srgb, var(--primary) 40%, transparent); }
  .tabs button.on {
    /* a11y: filled pill using the per-theme --pill/--on-pill pair (AA-computed
       for every palette; see .till-link note) */
    color: var(--on-pill); border-bottom: none; border-color: transparent;
    background: var(--pill);
    box-shadow: 0 4px 12px color-mix(in srgb, var(--pill) 38%, transparent);
  }
  .tabs button.on:hover { color: var(--on-pill); }

  /* buttons */
  button { transition: background .15s, box-shadow .15s, transform .08s, border-color .15s; }
  button.primary {
    background: linear-gradient(180deg, color-mix(in srgb, var(--primary) 90%, #fff 10%), var(--primary));
    box-shadow: 0 3px 10px color-mix(in srgb, var(--primary) 32%, transparent);
  }
  button.primary:hover { background: linear-gradient(180deg, color-mix(in srgb, var(--primary) 94%, #fff 6%), var(--primary-hov)); box-shadow: 0 6px 16px color-mix(in srgb, var(--primary) 40%, transparent); }
  button.primary:active { transform: translateY(1px); }
  button.ghost {
    background: color-mix(in srgb, var(--panel) 60%, transparent);
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    border: 1px solid color-mix(in srgb, var(--border) 68%, transparent);
  }
  button.ghost:hover { background: color-mix(in srgb, var(--panel2) 82%, transparent); border-color: color-mix(in srgb, var(--primary) 42%, transparent); color: var(--primary); }

  /* inputs */
  input, select {
    background: color-mix(in srgb, var(--input) 82%, transparent);
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
  }
  input:focus, select:focus { box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 16%, transparent); }

  /* button grid used by tab toolbars (Menu & Recipes actions, etc.) */
  .btnrow { display: flex; flex-wrap: wrap; gap: 8px; }
  .btnrow button { flex: 0 1 auto; }

  /* Mobile: lay tab-toolbar buttons out as a tidy 2-up grid instead of a
     column of full-width bars (the old .toolbar>*{width:100%} stack). */
  @media (max-width: 720px) {
    .toolbar > button, .toolbar .btnrow button { flex: 1 1 calc(50% - 4px); width: auto; }
    .toolbar > button.primary, .toolbar .btnrow button.primary { flex-basis: 100%; }
    .btnrow { gap: 8px; }
    .tabs button { padding: 8px 13px; }
  }

  /* ── Admin cockpit shell (spec §1–2) ─────────────────────────────────── */
  .shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 234px; flex: 0 0 234px; background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow: hidden; z-index: 40;
  }
  .side-brand { display: flex; align-items: center; gap: 9px; padding: 16px 18px; border-bottom: 1px solid var(--border); }

  .pc-bars .track { height: 8px; border-radius: 999px; background: var(--panel2); overflow: hidden; }

  .count-up { font-variant-numeric: tabular-nums; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  @keyframes drawln { to { stroke-dashoffset: 0; } }
  .drawpath { stroke-dasharray: 1400; stroke-dashoffset: 1400; animation: drawln 1s ease forwards; }

  @media (max-width: 1023px) {

    .chead { padding: 12px 16px; }
    main { padding: 16px 14px 80px; }
    .hero .big { font-size: 30px; }
    .stat2 { grid-template-columns: 1fr; }

    var h = "";

    if (!f.sales.length && !f.credit.length) {
      h += '<div class="card" style="text-align:center;padding:34px 18px">' +
        '<div style="font-size:26px">✓</div>' +
        '<h2 style="margin:8px 0 4px">Nothing to review</h2>' +
        '<p class="sub" style="margin:0">Every synced sale reconciled and no customer is over their credit limit.</p></div>';
      el("main").innerHTML = h;
      return;
    }

    /* ── Flagged sales ── */
    h += '<section><h2>Sales to check <span class="badge flag">' + f.sales.length + "</span></h2>";
    if (!f.sales.length) {
      h += '<p class="sub">No sales flagged.</p>';
    } else {
      h += '<p class="sub" style="margin-top:0">These sales were accepted so nothing was lost, but the total the till sent doesn\'t match what the items add up to. Check each against the receipt, then mark it reviewed.</p>';
      f.sales.forEach(function (s) {
        var items = s.lines.map(function (l) { return qty3(l.qty) + "× " + esc(l.name); }).join(" · ");
        var pays = s.payments.map(function (p) { return esc(p.method) + " " + cur + " " + Y(p.amount); }).join(", ");
        h += '<div class="card flag-card" style="margin-bottom:10px">' +
          '<div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:baseline">' +
            '<div><b>' + esc(s.no || "Sale") + "</b>" + (s.userName ? ' <span class="badge dim">' + esc(s.userName) + "</span>" : "") +
              '<div class="sub" style="font-size:12px">' + esc(when(s.at || s.t)) + (items ? " · " + items : "") + "</div></div>" +
            '<button class="ghost" data-ack-sale="' + esc(s.id) + '">Mark reviewed</button>' +
          "</div>" +
          '<div style="display:flex;gap:22px;flex-wrap:wrap;margin-top:8px;font-size:13px">' +
            '<div><span class="sub">Till total</span><br><span class="num-bad mono">' + cur + " " + Y(s.claimedTotal) + "</span></div>" +
            '<div><span class="sub">Should be</span><br><span class="mono">' + cur + " " + Y(s.computedTotal) + "</span></div>" +
            (pays ? '<div><span class="sub">Taken as</span><br>' + pays + "</div>" : "") +
          "</div>" +
          '<ul class="flag-reasons">' + s.reasons.map(function (r) { return "<li>" + esc(r) + "</li>"; }).join("") + "</ul>" +
        "</div>";
      });
    }
    h += "</section>";

    /* ── Over-limit customers ── */
    h += '<section style="margin-top:22px"><h2>Over credit limit <span class="badge flag">' + f.credit.length + "</span></h2>";
    if (!f.credit.length) {
      h += '<p class="sub">No customer is over their limit.</p>';
    } else {
      h += '<p class="sub" style="margin-top:0">These customers owe more than their approved credit limit — often because two tills sold on credit before syncing. Follow up, then mark it reviewed.</p>' +
        '<div class="tbl-wrap"><table><thead><tr><th>Customer</th><th class="mono">Owes</th><th class="mono">Limit</th><th class="mono">Over by</th><th>Flagged</th><th></th></tr></thead><tbody>' +
        f.credit.map(function (c) {
          return "<tr><td><b>" + esc(c.name) + "</b></td>" +
            '<td class="mono num-bad">' + cur + " " + Y(c.balance) + "</td>" +
            '<td class="mono">' + cur + " " + Y(c.creditLimit) + "</td>" +
            '<td class="mono num-bad">' + cur + " " + Y(c.overBy) + "</td>" +
            "<td>" + esc(when(c.at)) + "</td>" +
            '<td><button class="ghost" data-ack-credit="' + esc(c.id) + '">Mark reviewed</button></td></tr>';
        }).join("") +
        "</tbody></table></div>";
    }
    h += "</section>";

    el("main").innerHTML = h;
    el("main").querySelectorAll("[data-ack-sale]").forEach(function (b) {
      b.onclick = function () { ackFlag("sale", b.getAttribute("data-ack-sale"), b); };
    });
    el("main").querySelectorAll("[data-ack-credit]").forEach(function (b) {
      b.onclick = function () { ackFlag("credit", b.getAttribute("data-ack-credit"), b); };
    });
    // Lazy-load the append-only audit trail (FIN-03) beneath the flags.
    var trail = document.createElement("section");
    trail.style.marginTop = "22px";
    trail.innerHTML = '<h2>Audit trail</h2><p class="sub" style="margin-top:0">A tamper-evident record of sensitive events — money flags, over-limit credit, reviews, refunds.</p><div id="trail" class="sub">Loading…</div>';
    el("main").appendChild(trail);
    api("/activity?limit=100").then(function (r) {
      var a = r.activity || [];
      var LBL = { "sale.flagged": "Money flag", "credit.over_limit": "Over credit limit", "flag.ack": "Marked reviewed", "sale.refund": "Refund" };
      el("trail").innerHTML = a.length
        ? '<div class="tbl-wrap"><table><thead><tr><th>When</th><th>Event</th><th>Ref</th><th>By</th><th>Detail</th></tr></thead><tbody>' +
          a.map(function (x) {
            var d = x.detail || {};
            var det = x.action === "sale.flagged" ? (esc(S.currency) + " " + Y(d.claimedTotal) + " → " + Y(d.computedTotal))
              : x.action === "credit.over_limit" ? ("over by " + esc(S.currency) + " " + Y(d.overBy))
              : x.action === "sale.refund" ? (esc(S.currency) + " " + Y(d.total)) : "";
            return "<tr><td>" + esc(when(new Date(x.at).getTime())) + "</td><td><b>" + esc(LBL[x.action] || x.action) + "</b></td><td>" + esc(x.ref || "") + "</td><td>" + esc(x.actor || "system") + "</td><td class=\"sub\">" + det + "</td></tr>";
          }).join("") + "</tbody></table></div>"
        : '<p class="sub">No events recorded yet.</p>';
    }).catch(function () { el("trail").innerHTML = '<p class="sub">Couldn’t load the audit trail.</p>'; });
  }

  /* ── Assistant tab (§18–19) ──────────────────────────────────────────
     Reorder + watch lists learned from the ledger (always on), plus a
     question box that answers grounded on the same numbers when a key is set. */
  function renderAssistant() {
    el("main").innerHTML =
      '<div class="ask"><label style="font-weight:600;font-size:14px">Ask about your stock</label>' +
      '<div style="display:flex;gap:8px;margin-top:8px"><input id="aiQ" placeholder="e.g. What should I order this week?" style="flex:1" />' +
      '<button class="primary" id="aiAsk">Ask</button></div>' +
      '<div class="ask-chips" id="aiChips">' +
      ["What should I reorder?", "What's being wasted?", "What's my slowest item?"].map(function (q) { return '<button class="chip-q" data-q="' + esc(q) + '">' + esc(q) + "</button>"; }).join("") +
      "</div><div id=\"aiAnswer\"></div></div>" +
      '<div id="aiBody"><p class="hint">Reading your stock history…</p></div>';
    function ask(q) {
      if (!q || !q.trim()) return;
      el("aiQ").value = q;
      var box = el("aiAnswer"); box.innerHTML = '<div class="ai-a thinking">Thinking…</div>';
      el("aiAsk").disabled = true;
      api("/assistant", { method: "POST", body: JSON.stringify({ question: q }) })
        .then(function (r) { box.innerHTML = '<div class="ai-a">' + esc(r.answer).replace(/\n/g, "<br>") + "</div>"; })
        .catch(function (e) { box.innerHTML = '<div class="ai-a warn">' + esc(e.message) + "</div>"; })
        .then(function () { el("aiAsk").disabled = false; });
    }
    el("aiAsk").onclick = function () { ask(el("aiQ").value); };
    el("aiQ").onkeydown = function (e) { if (e.key === "Enter") ask(el("aiQ").value); };
    el("aiChips").querySelectorAll("[data-q]").forEach(function (b) { b.onclick = function () { ask(b.dataset.q); }; });

    api("/insights").then(function (r) {
      S.currency = r.currency || S.currency;
      var body = el("aiBody"); if (!body) return;
      var reorder = r.reorder || [], watch = r.watch || [];
      var reHtml = reorder.length
        ? '<div class="cards">' + reorder.map(function (it) {
            return '<div class="card attn"><div class="k">' + esc(it.name) + "</div>" +
              '<div class="v" style="font-size:20px">' + it.suggestQty + " " + esc(it.suggestUnit) + "</div>" +
              '<div class="n">' + (it.daysCover === 0 ? "out within a day" : "~" + it.daysCover + " day" + (it.daysCover === 1 ? "" : "s") + " of cover left") + " · ≈ " + esc(r.currency) + " " + Y(it.suggestCost) + "</div>" +
              '<button class="tiny ghost" data-order="' + it.id + '" style="margin-top:8px">Add to a delivery</button></div>';
          }).join("") + "</div>"
        : '<div class="panel pad" style="text-align:center"><b>Nothing needs ordering right now 👍</b><div class="hint" style="margin-top:6px">As items sell down, they’ll show up here with a suggested order.</div></div>';
      var wHtml = watch.length
        ? '<div class="suggest">' + watch.map(function (w) {
            var cls = w.type === "low" ? "warn" : w.type === "wastage" ? "amber" : "ok";
            var ic = w.type === "low" ? "⚠️" : w.type === "wastage" ? "🗑️" : "💤";
            return '<div class="s ' + cls + '"><span style="font-size:18px">' + ic + '</span><div class="txt"><b>' + esc(w.name) + "</b> — " + esc(w.detail) + '</div><button class="tiny ghost" data-look="' + w.id + '">Open</button></div>';
          }).join("") + "</div>"
        : '<p class="hint">Nothing to flag — no low stock, unusual wastage or dead stock right now.</p>';
      var fastHtml = (r.fast || []).length ? '<div class="chips" style="margin-top:8px">' + r.fast.map(function (f) { return '<span class="badge dim">' + esc(f.name) + " · " + qty3(f.used) + " " + esc(f.baseUnit) + "/mo</span>"; }).join("") + "</div>" : "";
      body.innerHTML =
        "<section><h2>Order soon</h2>" + reHtml + '<p class="hint">Suggested from how fast each item has actually been used — enough to last about three weeks.</p></section>' +
        "<section><h2>Keep an eye on</h2>" + wHtml + "</section>" +
        (fastHtml ? "<section><h2>Moving fastest</h2>" + fastHtml + "</section>" : "");
      body.querySelectorAll("[data-order]").forEach(function (b) {
        b.onclick = function () {
          var it = reorder.find(function (x) { return x.id === b.dataset.order; });
          var ing = ingById(it.id) || {};
          var isPack = (ing.units || []).some(function (u) { return u.name === it.suggestUnit; });
          S.inv = { supplierId: "", invoiceNo: "", lines: [{ ingredientId: it.id, desc: "", qty: String(it.suggestQty), unitName: isPack ? it.suggestUnit : "", cost: (it.suggestCost / 100).toFixed(2) }] };
          go("deliveries"); toast(it.name + " added — set the supplier, then Add to stock");
        };
      });
      body.querySelectorAll("[data-look]").forEach(function (b) { b.onclick = function () { var ing = ingById(b.dataset.look); if (ing) historyModal(ing); }; });
    }).catch(function (e) { var body = el("aiBody"); if (body) body.innerHTML = '<p class="empty">Could not load insights: ' + esc(e.message) + "</p>"; });
  }

  /* ── Overview tab (§4) ───────────────────────────────────────────────
     Answers "what came in, what's low, what's out, what needs a recipe, and
     what should I do next" in plain language, each card a shortcut to the
     screen that fixes it. */
  function renderOverview() {
    var ings = S.ingredients || [], prods = S.products || [];
    var stockValue = ings.reduce(function (a, i) { return a + Number(i.current_stock) * Number(i.avg_cost); }, 0);
    var low = ings.filter(function (i) { return i.low; });
    var out = ings.filter(function (i) { return Number(i.current_stock) <= 0; });
    var noRecipe = prods.filter(function (p) { return !p.recipeLines; });
    var closed = (S.audits || []).filter(function (a) { return a.status === "closed" && a.closed_at; })
      .sort(function (a, b) { return new Date(b.closed_at) - new Date(a.closed_at); });
    var lastCount = closed[0] ? closed[0].closed_at : null;
    var daysSince = lastCount ? Math.floor((Date.now() - new Date(lastCount)) / 86400000) : null;
    var countTxt = lastCount == null ? "never" : daysSince === 0 ? "today" : daysSince === 1 ? "yesterday" : daysSince + " days ago";

    function card(cls, k, v, note, tab) {
      return '<div class="card ' + cls + (tab ? " tap" : "") + '"' + (tab ? ' data-go="' + tab + '"' : '') + '>' +
        '<div class="k">' + esc(k) + '</div><div class="v">' + v + '</div>' + (note ? '<div class="n">' + esc(note) + '</div>' : '') + '</div>';
    }
    var cardsHtml =
      card("", "Stock value", '<small>' + esc(S.currency) + '</small> ' + (stockValue / 100).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }), "value of ingredients on hand", "ingredients") +
      card(low.length ? "attn" : "good", "Low stock", low.length, low.length ? "running low — reorder soon" : "nothing running low", "ingredients") +
      card(out.length ? "attn" : "good", "Out of stock", out.length, out.length ? "menu items using them are unavailable" : "everything in stock", "ingredients") +
      card(noRecipe.length ? "attn" : "good", "Missing recipes", noRecipe.length, noRecipe.length ? "usage can't be tracked yet" : "every item has a recipe", "recipes") +
      card("", "Ingredients", ings.length, "tracked items", "ingredients") +
      card(daysSince != null && daysSince <= 7 ? "good" : "attn", "Last stock check", '<span style="font-size:19px">' + esc(countTxt) + '</span>', "physical count", "audit");

    var sug = [];
    if (out.length) sug.push(["warn", "<b>" + out.length + " ingredient" + (out.length > 1 ? "s are" : " is") + " out of stock.</b> Menu items that need " + (out.length > 1 ? "them" : "it") + " are showing as sold out. Receive a delivery to restock.", "deliveries"]);
    if (low.length) sug.push(["amber", "<b>" + low.length + " ingredient" + (low.length > 1 ? "s are" : " is") + " running low.</b> Review " + (low.length > 1 ? "them" : "it") + " and plan a purchase before " + (low.length > 1 ? "they" : "it") + " run" + (low.length > 1 ? "" : "s") + " out.", "ingredients"]);
    if (noRecipe.length) sug.push(["amber", "<b>" + noRecipe.length + " menu item" + (noRecipe.length > 1 ? "s don't" : " doesn't") + " have a recipe.</b> Add ingredients so stock is deducted automatically when " + (noRecipe.length > 1 ? "they" : "it") + " sell" + (noRecipe.length > 1 ? "" : "s") + ".", "recipes"]);
    if (daysSince == null || daysSince > 7) sug.push(["amber", "<b>Your last stock check was " + countTxt + ".</b> Start a new count to confirm the quantities on your shelves.", "audit"]);
    if (!ings.length) sug = [["", "<b>No ingredients yet.</b> Add the things you buy and store, or record a delivery — then link them to your menu so stock tracks itself.", "ingredients"]];
    if (!sug.length) sug = [["ok", "<b>Everything looks in order.</b> Stock is healthy, recipes are linked, and your count is recent. 🎉", null]];
    var sugHtml = sug.map(function (s) {
      return '<div class="s ' + s[0] + '"><div class="txt">' + s[1] + '</div>' + (s[2] ? '<button class="tiny ghost" data-go="' + s[2] + '">Open →</button>' : '') + '</div>';
    }).join("");

    var FLOW = [
      ["📥", "Receive", "Goods arrive from a supplier. Record the quantity, cost and invoice on Deliveries and the stock is added for you.", "deliveries"],
      ["🫙", "Store", "Everything you hold sits under Ingredients with how much is left and what it costs — no accounting needed.", "ingredients"],
      ["🍳", "Use / sell", "When a menu item with a recipe sells, its ingredients are deducted automatically. No manual entry.", "recipes"],
      ["🗑️", "Waste / adjust", "Something spoiled or miscounted? Record it with a reason so your figures stay honest.", "ingredients"],
      ["📋", "Count", "Every so often, physically count your shelves. The system reconciles the difference on Stock Check.", "audit"],
    ];
    var flowHtml = FLOW.map(function (f, i) {
      return '<div class="st" data-flow="' + i + '"><div class="ic">' + f[0] + '</div><div class="nm">' + esc(f[1]) + '</div></div>' +
        (i < FLOW.length - 1 ? '<div class="ar">→</div>' : '');
    }).join("");

    el("main").innerHTML =
      '<div class="lead"><h1>' + esc(TAB_HELP.overview[0]) + '</h1><p>' + esc(TAB_HELP.overview[1]) + '</p></div>' +
      '<div class="cards">' + cardsHtml + '</div>' +
      '<h2>How stock flows</h2><div class="flow" id="flow">' + flowHtml + '</div>' +
      '<div class="flow-explain" id="flowEx">' + esc(FLOW[0][2]) + '</div>' +
      '<h2>What should I do next?</h2><div class="suggest">' + sugHtml + '</div>';

    el("main").querySelectorAll("[data-go]").forEach(function (b) { b.onclick = function () { go(b.dataset.go); }; });
    el("flow").querySelectorAll("[data-flow]").forEach(function (st) {
      st.onclick = function () {
        el("flow").querySelectorAll(".st").forEach(function (x) { x.classList.remove("on"); });
        st.classList.add("on");
        el("flowEx").textContent = FLOW[+st.dataset.flow][2];
      };
    });
    el("flow").querySelector(".st").classList.add("on");
  }

  /* ── Ingredients tab ─────────────────────────────────────────────── */
  function renderIngredients() {
    var rows = S.ingredients.map(function (i) {
      return "<tr>" +
        "<td>" + esc(i.name) + (i.sku ? ' <span class="badge dim">' + esc(i.sku) + "</span>" : "") + (i.sellable ? ' <span class="badge ok">Sells on till · ' + esc(S.currency) + " " + Y(i.sell_price) + "</span>" : "") + (i.producible ? ' <span class="badge amber">Made in-house</span>' : "") + "</td>" +
        "<td>" + esc(i.location) + "</td>" +
        '<td class="mono">' + qty3(i.current_stock) + " " + esc(i.base_unit) + "</td>" +
        '<td class="mono">' + (i.avg_cost / 100).toFixed(4) + "/" + esc(i.base_unit) + "</td>" +
        "<td>" + (i.low ? '<span class="badge low">Low</span>' : '<span class="badge ok">OK</span>') + "</td>" +
        "<td>" + (i.units || []).map(function (u) { return '<span class="badge dim">1 ' + esc(u.name) + " = " + qty3(u.factor) + " " + esc(i.base_unit) + "</span>"; }).join(" ") + "</td>" +
        "<td>" + (i.producible ? '<button class="tiny ghost" data-batch="' + i.id + '">Make batch</button> ' : "") + '<button class="tiny ghost" data-adj="' + i.id + '">Adjust</button> <button class="tiny ghost" data-hist="' + i.id + '">History</button> <button class="tiny ghost" data-edit="' + i.id + '">Edit</button> <button class="tiny ghost" data-del="' + i.id + '">Remove</button></td>' +
        "</tr>";
    }).join("");
    el("main").innerHTML =
      '<div class="toolbar"><h2 style="margin:0">Ingredients</h2><button class="primary" id="addIng">+ New ingredient</button></div>' +
      '<div class="tbl-wrap"><table><thead><tr><th>Name</th><th>Where</th><th class="mono">In stock</th><th class="mono">Avg cost /unit</th><th>Status</th><th>Pack sizes</th><th></th></tr></thead>' +
      "<tbody>" + (rows || '<tr><td colspan="7" class="empty">No ingredients yet — add your first one.</td></tr>') + "</tbody></table></div>" +
      '<p class="hint">Avg cost is per base unit (' + esc(S.currency) + " sub-units) and updates automatically each time you enter a delivery.</p>";
    el("addIng").onclick = function () { ingredientModal(null); };
    el("main").querySelectorAll("[data-batch]").forEach(function (b) { b.onclick = function () { batchModal(ingById(b.dataset.batch)); }; });
    el("main").querySelectorAll("[data-adj]").forEach(function (b) { b.onclick = function () { adjustModal(ingById(b.dataset.adj)); }; });
    el("main").querySelectorAll("[data-hist]").forEach(function (b) { b.onclick = function () { historyModal(ingById(b.dataset.hist)); }; });
    el("main").querySelectorAll("[data-edit]").forEach(function (b) { b.onclick = function () { ingredientModal(ingById(b.dataset.edit)); }; });
    el("main").querySelectorAll("[data-del]").forEach(function (b) {
      b.onclick = function () {
        var i = ingById(b.dataset.del);
        if (!confirm('Remove "' + i.name + '"? Recipes using it will lose this line.')) return;
        api("/ingredients/" + encodeURIComponent(i.id), { method: "DELETE" }).then(function () { toast("Removed " + i.name); return loadAll(); }).then(render).catch(function (e) { toast(e.message); });
      };
    });
  }

  var WASTE_REASONS = ["Spoiled", "Expired", "Broken / spill", "Staff meal", "Prep loss"];
  var CORRECT_REASONS = ["Miscount", "Found extra", "Went missing", "Supplier short"];
  function adjustModal(ing) {
    if (!ing) return;
    var st = { mode: "waste", reason: "", qty: "", unit: "", from: ing.location || "", to: "", breakdown: [{ location: ing.location || "Store", qty: ing.current_stock }] };
    function unitOpts() {
      return '<option value="">' + esc(ing.base_unit) + "</option>" +
        (ing.units || []).map(function (u) { return '<option value="' + esc(u.name) + '"' + (st.unit === u.name ? " selected" : "") + ">" + esc(u.name) + " (" + qty3(u.factor) + " " + esc(ing.base_unit) + ")</option>"; }).join("");
    }
    function factorOf(name) { if (!name) return 1; var u = (ing.units || []).find(function (x) { return x.name === name; }); return u ? u.factor : 1; }
    function balAt(loc) { var b = st.breakdown.find(function (x) { return x.location === loc; }); return b ? b.qty : 0; }
    function locBreakdownHtml() {
      if (st.breakdown.length < 2) return "";
      return '<div class="chips" style="margin:2px 0 12px">' + st.breakdown.map(function (b) {
        return '<span class="badge dim">' + esc(b.location) + ": " + qty3(b.qty) + " " + esc(ing.base_unit) + "</span>";
      }).join("") + "</div>";
    }
    function draw() {
      var mode = st.mode, isW = mode === "waste", isMove = mode === "move";
      var reasons = isW ? WASTE_REASONS : CORRECT_REASONS;
      var fields;
      if (isMove) {
        var fromOpts = st.breakdown.filter(function (b) { return b.qty > 0; }).map(function (b) {
          return '<option value="' + esc(b.location) + '"' + (st.from === b.location ? " selected" : "") + ">" + esc(b.location) + " (" + qty3(b.qty) + " " + esc(ing.base_unit) + ")</option>";
        }).join("");
        var toOpts = LOCATIONS.map(function (l) { return '<option value="' + esc(l) + '"' + (st.to === l ? " selected" : "") + ">" + esc(l) + "</option>"; }).join("");
        fields =
          '<div class="row2"><div><label>From</label><select id="aFrom" style="width:100%">' + (fromOpts || '<option value="">nothing in stock</option>') + "</select></div>" +
          '<div><label>To</label><select id="aTo" style="width:100%">' + toOpts + "</select></div></div>" +
          '<label style="margin-top:10px">How much to move?</label>' +
          '<div class="row2"><input id="aQty" class="num" inputmode="decimal" placeholder="amount" value="' + esc(st.qty) + '" style="width:100%" />' +
          '<select id="aUnit" style="width:100%">' + unitOpts() + "</select></div>" +
          '<input id="aNote" placeholder="Add a note (optional)" value="' + esc(st.reason) + '" style="width:100%;margin-top:10px" />';
      } else {
        fields =
          "<label>" + (isW ? "How much was thrown out or spoiled?" : "What’s actually on the shelf right now?") + "</label>" +
          '<div class="row2"><input id="aQty" class="num" inputmode="decimal" placeholder="' + (isW ? "amount" : "true count") + '" value="' + esc(st.qty) + '" style="width:100%" />' +
          '<select id="aUnit" style="width:100%">' + unitOpts() + "</select></div>" +
          '<label style="margin-top:10px">Reason' + (isW ? "" : " (optional)") + "</label>" +

        "</div></div>";
      el("ov").onclick = function (e) { if (e.target === el("ov")) close(); };
      el("aCancel").onclick = close;
      el("modalHost").querySelectorAll(".seg [data-m]").forEach(function (b) { b.onclick = function () { st.mode = b.dataset.m; draw(); }; });
      if (el("aReasons")) el("modalHost").querySelectorAll("#aReasons [data-r]").forEach(function (b) {
        b.onclick = function () {
          st.reason = st.reason === b.dataset.r ? "" : b.dataset.r;
          el("aNote").value = st.reason;
          el("modalHost").querySelectorAll("#aReasons [data-r]").forEach(function (x) { x.classList.toggle("on", x.dataset.r === st.reason); });
        };
      });
      el("aNote").oninput = function () { st.reason = el("aNote").value; };
      el("aQty").oninput = function () { st.qty = el("aQty").value; preview(); };
      el("aUnit").onchange = function () { st.unit = el("aUnit").value; preview(); };
      if (el("aFrom")) el("aFrom").onchange = function () { st.from = el("aFrom").value; preview(); };
      if (el("aTo")) el("aTo").onchange = function () { st.to = el("aTo").value; preview(); };
      el("aSave").onclick = save;
      el("aQty").focus();
      preview();
    }
    function preview() {
      var amt = parseFloat(el("aQty").value);
      var box = el("aPrev");
      if (st.mode === "move") {
        var from = el("aFrom") ? el("aFrom").value : "", to = el("aTo") ? el("aTo").value : "";
        if (!from || !to) { box.innerHTML = "Nothing in stock to move yet."; return; }
        if (from === to) { box.innerHTML = '<span style="color:var(--warn)">Pick two different locations.</span>'; return; }
        if (isNaN(amt) || amt <= 0) { box.innerHTML = "Enter how much to move from <b>" + esc(from) + "</b> to <b>" + esc(to) + "</b>."; return; }
        var mbase = Math.round(amt * factorOf(el("aUnit").value) * 1000) / 1000, fbal = balAt(from);
        if (mbase > fbal + 1e-9) { box.innerHTML = '<span style="color:var(--warn)">Only <b>' + qty3(fbal) + " " + esc(ing.base_unit) + "</b> in " + esc(from) + " — can’t move more than that.</span>"; return; }
        box.innerHTML = esc(from) + " <b>" + qty3(fbal) + "→" + qty3(Math.round((fbal - mbase) * 1000) / 1000) + "</b> · " + esc(to) + " <b>" + qty3(balAt(to)) + "→" + qty3(Math.round((balAt(to) + mbase) * 1000) / 1000) + "</b> " + esc(ing.base_unit) + "<br>Total stock stays <b>" + friendlyQty(ing, ing.current_stock) + "</b>.";
        return;
      }
      if (isNaN(amt) || amt < 0) { box.innerHTML = "Enter an amount to see the effect."; return; }
      var base = Math.round(amt * factorOf(el("aUnit").value) * 1000) / 1000;
      var avg = ing.avg_cost / 100;
      if (st.mode === "waste") {
        if (base > ing.current_stock + 1e-9) {
          box.innerHTML = '<span style="color:var(--warn)">You only have <b>' + friendlyQty(ing, ing.current_stock) + "</b> — you can’t waste more than that.</span>";
          return;
        }
        box.innerHTML = "Removes <b>" + qty3(base) + " " + esc(ing.base_unit) + "</b> · value lost <b>" + esc(S.currency) + " " + (base * avg).toFixed(2) + "</b><br>New stock: <b>" + friendlyQty(ing, Math.round((ing.current_stock - base) * 1000) / 1000) + "</b>";
      } else {
        var delta = Math.round((base - ing.current_stock) * 1000) / 1000;
        if (delta === 0) { box.innerHTML = "That matches the system — nothing to correct."; return; }
        box.innerHTML = "System says <b>" + friendlyQty(ing, ing.current_stock) + "</b> → you counted <b>" + friendlyQty(ing, base) + "</b><br>Records a <b style=\"color:" + (delta < 0 ? "var(--warn)" : "var(--ok)") + '">' + (delta > 0 ? "+" : "") + qty3(delta) + " " + esc(ing.base_unit) + "</b> difference.";
      }
    }
    function close() { el("modalHost").innerHTML = ""; }
    function save() {
      var amt = parseFloat(el("aQty").value);
      if (isNaN(amt) || amt < 0) return toast("Enter an amount first");
      if (st.mode !== "correct" && !(amt > 0)) return toast("Enter an amount first");
      el("aSave").disabled = true;
      if (st.mode === "move") {
        var from = el("aFrom").value, to = el("aTo").value;
        if (!from || !to || from === to) { el("aSave").disabled = false; return toast("Pick two different locations"); }
        api("/transfer", { method: "POST", body: JSON.stringify({ ingredientId: ing.id, fromLoc: from, toLoc: to, qty: amt, unitName: el("aUnit").value || "", reason: el("aNote").value.trim() }) })
          .then(function () { toast("Moved " + from + " → " + to); close(); return loadAll(); })
          .then(render)
          .catch(function (e) { el("aSave").disabled = false; toast(e.message); });
        return;
      }
      var body = { ingredientId: ing.id, mode: st.mode, qty: amt, unitName: el("aUnit").value || "", reason: el("aNote").value.trim() };
      api("/adjust", { method: "POST", body: JSON.stringify(body) })
        .then(function (r) {
          toast(r.unchanged ? "Already matches — no change" : (st.mode === "waste" ? "Wastage recorded" : "Stock corrected"));
          close(); return loadAll();
        })
        .then(render)
        .catch(function (e) { el("aSave").disabled = false; toast(e.message); });
    }
    draw();
    /* Pull real per-location balances; the modal opens instantly on the
       single-location fallback and upgrades in place when they arrive. */
    api("/locations/" + encodeURIComponent(ing.id)).then(function (r) {
      if (Array.isArray(r.breakdown) && r.breakdown.length) st.breakdown = r.breakdown;
      if (!st.to) { var other = LOCATIONS.find(function (l) { return l !== st.from; }); st.to = other || ""; }
      if (el("modalHost").querySelector(".modal")) draw();
    }).catch(function () {});
  }

  function batchModal(ing) {

    function unitOpts() {
      return '<option value="">' + esc(ing.base_unit) + "</option>" +
        (ing.units || []).map(function (u) { return '<option value="' + esc(u.name) + '"' + (st.unit === u.name ? " selected" : "") + ">" + esc(u.name) + " (" + qty3(u.factor) + " " + esc(ing.base_unit) + ")</option>"; }).join("");
    }
    el("modalHost").innerHTML =
      '<div class="overlay" id="ov"><div class="modal">' +
      "<h3>Make a batch — " + esc(ing.name) + "</h3>" +
      '<p class="sub">Producing a batch uses up the ingredients below and adds the finished amount to stock. In stock now: <b>' + friendlyQty(ing, ing.current_stock) + "</b>.</p>" +
      '<label>How much did you make?</label>' +
      '<div class="row2"><input id="bQty" class="num" inputmode="decimal" placeholder="batch amount" style="width:100%" />' +

      "</div></div>";

    el("bCancel").onclick = close;

    function preview() {
      var box = el("bPrev");
      if (!st.recipe) return;
      if (!st.recipe.lines.length) { box.innerHTML = '<span style="color:var(--warn)">No recipe yet — open Edit and add what this is made from.</span>'; return; }
      var amt = parseFloat(el("bQty").value);
      if (isNaN(amt) || amt <= 0) { box.innerHTML = "Enter a batch amount to see what it uses."; return; }
      var outBase = Math.round(amt * factorOf(el("bUnit").value) * 1000) / 1000;
      var short = null, cost = 0;
      var rows = st.recipe.lines.map(function (l) {
        var need = Math.round(l.qty * outBase * 1000) / 1000;
        var have = (ingById(l.ingredientId) || {}).current_stock;
        cost += need * (l.unitCost / 100);
        var ok = have == null || need <= have + 1e-9;
        if (!ok && !short) short = l.name;
        return '<div style="display:flex;justify-content:space-between">' + esc(l.name) + '<span class="mono' + (ok ? "" : '" style="color:var(--warn)') + '">' + qty3(need) + " " + esc(l.baseUnit) + (ok ? "" : " (only " + qty3(have) + ")") + "</span></div>";
      }).join("");
      box.innerHTML = "Uses:" + rows + '<div style="display:flex;justify-content:space-between;margin-top:6px;border-top:1px solid var(--border);padding-top:6px"><b>Makes ' + qty3(outBase) + " " + esc(ing.base_unit) + "</b><b>" + esc(S.currency) + " " + cost.toFixed(2) + "</b></div>" +
        (short ? '<div style="color:var(--warn);margin-top:6px">Not enough ' + esc(short) + " for this batch.</div>" : "");
      el("bSave").disabled = !!short;
    }
    el("bQty").oninput = preview; el("bUnit").onchange = preview;
    el("bSave").onclick = function () {
      var amt = parseFloat(el("bQty").value);
      if (isNaN(amt) || !(amt > 0)) return toast("Enter a batch amount");
      el("bSave").disabled = true;
      api("/produce", { method: "POST", body: JSON.stringify({ ingredientId: ing.id, qty: amt, unitName: el("bUnit").value || "" }) })
        .then(function (r) { toast("Made " + qty3(r.made) + " " + r.baseUnit + " of " + r.name); close(); return loadAll(); })
        .then(render)
        .catch(function (e) { el("bSave").disabled = false; toast(e.message); });
    };
    api("/recipes/" + encodeURIComponent(ing.id)).then(function (r) { st.recipe = r; preview(); })
      .catch(function (e) { el("bPrev").innerHTML = '<span style="color:var(--warn)">Could not load recipe: ' + esc(e.message) + "</span>"; });

  var MOVE_KINDS = {

  function historyModal(ing) {
    if (!ing) return;
    el("modalHost").innerHTML =
      '<div class="overlay" id="ov"><div class="modal" style="max-width:560px">' +
      "<h3>Stock history — " + esc(ing.name) + "</h3>" +
      '<p class="sub">Every change to this ingredient, newest first. The running total shows what the system thought you had after each event.</p>' +
      '<div id="histBody"><p class="hint">Loading…</p></div>' +
      '<div class="actions"><button class="ghost" id="mClose">Close</button></div>' +
      "</div></div>";
    el("ov").onclick = function (e) { if (e.target === el("ov")) close(); };
    el("mClose").onclick = close;
    function close() { el("modalHost").innerHTML = ""; }
    api("/history/" + encodeURIComponent(ing.id)).then(function (r) {
      var moves = r.moves || [], u = esc((r.ingredient && r.ingredient.baseUnit) || ing.base_unit || "");
      // Running balance forward from 0 (moves come oldest-first)
      var bal = 0, withBal = moves.map(function (m) { bal = Math.round((bal + m.qty) * 1000) / 1000; return { m: m, bal: bal }; });
      if (!moves.length) {
        el("histBody").innerHTML = '<p class="empty">Nothing recorded yet. History starts building as you enter deliveries, ring up sales and run stock checks.</p>';
        return;
      }
      var received = 0, used = 0;
      moves.forEach(function (m) { if (m.qty > 0) received += m.qty; else used += -m.qty; });
      var nowStock = (r.ingredient && r.ingredient.currentStock) != null ? r.ingredient.currentStock : bal;
      var chips = '<div class="cards" style="grid-template-columns:repeat(3,1fr);margin:0 0 14px">' +
        '<div class="card good"><div class="k">Received in total</div><div class="v mono">' + qty3(received) + " <small>" + u + "</small></div></div>" +
        '<div class="card"><div class="k">Used / removed</div><div class="v mono">' + qty3(used) + " <small>" + u + "</small></div></div>" +
        '<div class="card"><div class="k">In stock now</div><div class="v mono">' + qty3(nowStock) + " <small>" + u + "</small></div></div>" +
        "</div>";
      var rows = withBal.slice().reverse().map(function (w) {
        var m = w.m, k = MOVE_KINDS[m.kind] || { label: m.kind, icon: "•", cls: "" };
        var sign = m.qty > 0 ? "+" : "";

        var whenStr = when.toLocaleDateString() + " " + when.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        var costStr = m.unitCost ? " · " + esc(S.currency) + " " + (m.unitCost / 100).toFixed(4) + "/" + u : "";
        var note = m.note ? ' · <span style="color:var(--sub)">' + esc(m.note) + "</span>" : "";
        return '<div class="st ' + k.cls + '" style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:10px 12px">' +
          "<div><div style=\"font-weight:600;font-size:13.5px\">" + k.icon + " " + esc(k.label) + '</div><div class="hint" style="margin:3px 0 0">' + whenStr + costStr + note + "</div></div>" +
          '<div style="text-align:right;white-space:nowrap"><div class="mono" style="font-weight:700;color:' + (m.qty > 0 ? "var(--ok)" : "var(--text)") + '">' + sign + qty3(m.qty) + " " + u + '</div><div class="hint mono" style="margin:3px 0 0">balance ' + qty3(w.bal) + "</div></div>" +
          "</div>";
      }).join("");
      el("histBody").innerHTML = chips + '<div class="flow hist-list">' + rows + "</div>";
    }).catch(function (e) { el("histBody").innerHTML = '<p class="empty">Could not load history: ' + esc(e.message) + "</p>"; });
  }

      el("ov").onclick = function (e) { if (e.target === el("ov")) close(); };
