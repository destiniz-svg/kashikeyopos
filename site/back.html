        prep.lines = prep.lines.map(function (l, i) {
          var s = el("modalHost").querySelector('[data-pi="' + i + '"]'), q = el("modalHost").querySelector('[data-pq="' + i + '"]');
          return { ingredientId: s ? s.value : l.ingredientId, qty: q ? q.value : l.qty };
        });
      }
    }
    function close() { el("modalHost").innerHTML = ""; }
    function save() {
      pull();
      var body = {
        id: ing ? ing.id : undefined,
        name: el("mName").value.trim(), sku: el("mSku").value.trim(),
        baseUnit: el("mBase").value, minStock: parseFloat(el("mMin").value) || 0, location: el("mLoc").value,
        units: units.map(function (u) { return { name: String(u.name).trim(), factor: parseFloat(u.factor) || 0 }; }).filter(function (u) { return u.name && u.factor > 0; }),
        sellable: sell.on, sellPrice: sell.on ? Math.round((parseFloat(sell.price) || 0) * 100) : 0,
        sellEmoji: sell.emoji, sellCat: String(sell.cat || "Resale").trim() || "Resale",
        producible: prep.on,
        prepLines: prep.lines.map(function (l) { return { ingredientId: l.ingredientId, qty: parseFloat(l.qty) || 0 }; }).filter(function (l) { return l.ingredientId && l.qty > 0; }),
      };
      if (!body.name) return toast("Give it a name");
      if (body.sellable && !(body.sellPrice > 0)) return toast("Set a selling price for the resale item");
      if (body.producible && !body.prepLines.length) return toast("Add what the prep item is made from");
      api("/ingredients", { method: "POST", body: JSON.stringify(body) })
        .then(function () { close(); toast(body.name + " saved"); return loadAll(); }).then(render)
        .catch(function (e) { toast(e.message); });
    }
    draw();
    /* Load the existing prep recipe so editing a made-in-house item shows its
       components instead of an empty editor. */
    if (ing && ing.producible) api("/recipes/" + encodeURIComponent(ing.id)).then(function (r) {
      if (r.lines && r.lines.length && el("mPrep")) { pull(); prep.lines = r.lines.map(function (l) { return { ingredientId: l.ingredientId, qty: l.qty }; }); draw(); }
    }).catch(function () {});
  }

  /* ── Menu & Recipes tab ──────────────────────────────────────────── */
  function renderRecipes() {
    var q = S.prodFilter.toLowerCase();
    var prods = S.products.filter(function (p) { return !q || p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q); });
    var list = prods.map(function (p) {
      return '<div class="p ' + (S.selProduct === p.id ? "on" : "") + '" data-p="' + p.id + '">' +
        "<span>" + esc(p.emoji || "🍽") + '</span><span class="nm">' + esc(p.name) + "</span>" +
        (p.stockable ? '<span class="badge ok">📦 stock</span>' : p.recipeLines ? '<span class="badge ok">recipe</span>' : '<span class="badge dim">none</span>') +
        '<span class="pr">' + Y(p.price) + "</span></div>";
    }).join("");
    el("main").innerHTML =
      '<div class="split">' +
      '<div><div class="toolbar" style="margin-bottom:12px;display:flex;flex-direction:column;gap:9px;align-items:stretch">' +
      '<input type="search" id="pSearch" placeholder="Search the menu…" value="' + esc(S.prodFilter) + '" style="width:100%" />' +
      '<div class="btnrow">' +
      '<button class="ghost tiny" id="mTemplate" title="Download a blank Excel template to fill in">⬇ Template</button>' +
      '<button class="ghost tiny" id="mExport" title="Download the current menu as Excel">⬇ Export</button>' +
      '<button class="primary tiny" id="mImport" title="Upload a filled Excel to bulk add / update items">⬆ Import Excel</button>' +
      '<button class="ghost tiny" id="mEmbed" title="Download every web photo and store it compressed for offline use">⤓ Embed photos</button>' +
      '<button class="ghost tiny" id="mCatOrder" title="Set up main categories and sub categories for the till and guest menu">☰ Menu layout</button>' +
      '<button class="ghost tiny" id="mRestock" title="Set stock for every item at once, or make them all always-available">📦 Restock all</button>' +
      '<button class="ghost tiny" id="mOutlets" title="Add and manage outlets — every outlet shares this menu">🏪 Outlets</button>' +
      '</div>' +
      '<input type="file" id="mImportFile" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" style="display:none" /></div>' +
      '<div class="panel prodlist" id="plist">' + (list || '<div class="empty">No menu items match.</div>') + "</div></div>" +
      '<div class="panel" id="redit"><div class="empty">Pick a menu item to build its recipe.</div></div>' +
      "</div>";
    var ps = el("pSearch");
    ps.oninput = function () { S.prodFilter = ps.value; renderRecipes(); ps = el("pSearch"); ps.focus(); ps.setSelectionRange(ps.value.length, ps.value.length); };
    function dlFile(path) { var a = document.createElement("a"); a.href = path; a.download = ""; document.body.appendChild(a); a.click(); a.remove(); }
    el("mTemplate").onclick = function () { dlFile("/api/inv/menu/template.xlsx"); };
    el("mExport").onclick = function () { dlFile("/api/inv/menu/export.xlsx"); };
    el("mImport").onclick = function () { el("mImportFile").click(); };
    el("mImportFile").onchange = function () {
      var f = el("mImportFile").files && el("mImportFile").files[0]; if (!f) return;
      var go = confirm("Import “" + f.name + "” and bulk add / update the menu?");
      if (!go) { el("mImportFile").value = ""; return; }
      var replace = confirm("Also REMOVE current items that are NOT in the file?\n\nOK = full replace (delete anything missing).\nCancel = only add / update the items in the file (keep the rest).");
      var reader = new FileReader();
      reader.onload = function () {
        api("/menu/import", { method: "POST", body: JSON.stringify({ file: reader.result, replace: replace }) })
          .then(function (r) {
            toast("Imported — " + r.created + " added, " + r.updated + " updated" + (r.removed ? ", " + r.removed + " removed" : ""));
            return api("/products");
          })
          .then(function (r) { S.products = r.products; S.currency = r.currency; renderRecipes(); })
          .catch(function (e) { toast(e.message || "Import failed"); });
      };
      reader.readAsDataURL(f);
      el("mImportFile").value = "";
    };
    el("mEmbed").onclick = function () {
      var targets = S.products.filter(function (p) { return /^https?:/i.test(p.img || ""); });
      if (!targets.length) return toast("No web photos to embed — every photo is already stored offline.");
      if (!confirm("Download and embed " + targets.length + " photo" + (targets.length > 1 ? "s" : "") + " for offline use?\n\nEach is compressed and stored with the item. This may take a moment.")) return;
      var i = 0, done = 0, failed = 0;
      function next() {
        if (i >= targets.length) {
          toast("Embedded " + done + " photo" + (done !== 1 ? "s" : "") + " offline" + (failed ? " · " + failed + " couldn't be fetched (kept their link)" : ""));
          return api("/products").then(function (r) { S.products = r.products; renderRecipes(); });
        }
        var p = targets[i++];
        toast("Embedding photos… " + i + "/" + targets.length);
        urlToDataUri(p.img, function (uri) {
          if (!uri) { failed++; return next(); }
          api("/products/" + encodeURIComponent(p.id) + "/image", { method: "PUT", body: JSON.stringify({ img: uri }) })
            .then(function () { done++; p.img = uri; }).catch(function () { failed++; }).then(next);
        });
      }
      next();
    };
    el("mCatOrder").onclick = openMenuLayout;
    el("mRestock").onclick = openRestock;
    el("mOutlets").onclick = openOutlets;
    el("plist").querySelectorAll("[data-p]").forEach(function (d) {
      d.onclick = function () { S.selProduct = d.dataset.p; S.recipe = null; renderRecipes(); loadRecipe(); };
    });
    if (S.selProduct) { if (S.recipe) drawRecipeEditor(); else loadRecipe(); }
  }

  /* Full ordered category list = the saved order (kept only for categories that
     still exist on the menu) followed by any remaining categories, so a new
     category always shows up (at the end) even before it's been arranged. */
  function orderedCats() {
    var have = {}; S.products.forEach(function (p) { if (p.cat) have[p.cat] = true; });
    var seen = {}, out = [];
    (S.catOrder || []).forEach(function (c) { if (have[c] && !seen[c]) { seen[c] = true; out.push(c); } });
    Object.keys(have).sort().forEach(function (c) { if (!seen[c]) { seen[c] = true; out.push(c); } });
    return out;
  }

  /* Add & manage outlets. Every outlet shares this org's menu, categories and
     customers automatically (they're global), so a new outlet opens with the
     same menu; each till pulls its own store-scoped orders. Switching which
     outlet a till sells for is done on the till (tap the store name). */
  function openOutlets() {
    function draw(stores, def, prefs) {
      prefs = prefs || {};
      var rows = stores.map(function (s) {
        var pr = prefs[s.id] || {};
        var toggle = function (key, label, on) {
          return '<button class="ghost tiny" data-pref="' + esc(s.id) + '" data-key="' + key + '" data-on="' + (on ? "1" : "0") + '" style="' + (on ? "background:var(--primary);color:#fff;border-color:var(--primary)" : "") + '" title="' +
            (key === "floatLogout" ? "Auto sign-out to the PIN lock after each sale (shared-terminal float mode)" : "Waiters see only their own open tables") + '">' + (on ? "✓ " : "") + label + "</button>";
        };
        return '<div style="padding:9px 11px;border:1px solid var(--border);border-radius:12px;margin-bottom:7px;background:var(--panel2)">' +
          '<div style="display:flex;align-items:center;gap:8px">' +
          '<div style="flex:1;min-width:0"><div style="font-weight:600">' + esc(s.name) +
          (s.id === def ? ' <span class="badge dim">Main</span>' : "") +
          (s.active ? "" : ' <span class="badge" style="background:#FBEAE4;color:#8A3A22">Closed</span>') + "</div>" +
          '<div class="hint" style="margin:2px 0 0">' + esc(s.code) + (s.address ? " · " + esc(s.address) : "") + "</div></div>" +
          '<button class="ghost tiny" data-edit="' + esc(s.id) + '">Edit</button>' +
          '<button class="ghost tiny" data-active="' + esc(s.id) + '" data-on="' + (s.active ? "1" : "0") + '">' + (s.active ? "Close" : "Open") + "</button></div>" +
          '<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center">' + toggle("floatLogout", "Auto sign-out after sale", pr.floatLogout) + toggle("ownTablesOnly", "Waiters see own tables only", pr.ownTablesOnly) +
          '<label class="hint" style="margin:0 0 0 2px;display:inline-flex;align-items:center;gap:5px">Auto-lock when idle ' +
          '<select data-idle="' + esc(s.id) + '" style="padding:4px 6px;font-size:12px">' +
          [[0, "Off"], [60, "1 min"], [120, "2 min"], [300, "5 min"], [600, "10 min"], [900, "15 min"]].map(function (o) {
            return '<option value="' + o[0] + '"' + ((Number(pr.idleLockSec) || 0) === o[0] ? " selected" : "") + ">" + o[1] + "</option>";
          }).join("") + "</select></label></div>" +
          "</div>";
      }).join("");
      el("modalHost").innerHTML = '<div class="overlay" id="ov"><div class="modal" style="max-width:520px;max-height:88vh;overflow:auto">' +
        '<h3 style="margin:0 0 4px">Outlets</h3>' +
        '<p class="sub" style="margin:0 0 12px">Every outlet automatically shares this menu, categories and customers. To switch which outlet a till is selling for, tap the store name at the top of the till.</p>' +
        '<div id="outList">' + (rows || '<div class="empty">No outlets yet.</div>') + "</div>" +
        '<div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px">' +
        '<div style="font-weight:600;margin-bottom:6px" id="outFormTitle">Add an outlet</div>' +
        '<input type="hidden" id="outId" />' +
        '<input id="outName" placeholder="Outlet name — e.g. Hulhumale Branch" style="width:100%;margin-bottom:8px" />' +
        '<input id="outAddr" placeholder="Address (optional)" style="width:100%;margin-bottom:10px" />' +
        '<div style="display:flex;justify-content:space-between;gap:8px">' +
        '<button class="ghost" id="outCancel">Close</button>' +
        '<div style="display:flex;gap:8px"><button class="ghost" id="outClear" style="display:none">+ New</button><button class="primary" id="outSave">Add outlet</button></div></div>' +
        "</div></div></div>";
      el("modalHost").querySelectorAll("[data-edit]").forEach(function (b) {
        b.onclick = function () {
          var s = stores.filter(function (x) { return x.id === b.dataset.edit; })[0]; if (!s) return;
          el("outId").value = s.id; el("outName").value = s.name; el("outAddr").value = s.address || "";
          el("outFormTitle").textContent = "Edit outlet"; el("outSave").textContent = "Save changes"; el("outClear").style.display = "";
        };
      });
      el("modalHost").querySelectorAll("[data-active]").forEach(function (b) {
        b.onclick = function () {
          b.disabled = true;
          api("/stores/" + encodeURIComponent(b.dataset.active) + "/active", { method: "POST", body: JSON.stringify({ active: b.dataset.on !== "1" }) })
            .then(load).catch(function (e) { b.disabled = false; toast(e.message || "Couldn't update"); });
        };
      });
      el("modalHost").querySelectorAll("[data-pref]").forEach(function (b) {
        b.onclick = function () {
          b.disabled = true;
          var body = {}; body[b.dataset.key] = b.dataset.on !== "1";
          api("/stores/" + encodeURIComponent(b.dataset.pref) + "/prefs", { method: "POST", body: JSON.stringify(body) })
            .then(load).catch(function (e) { b.disabled = false; toast(e.message || "Couldn't update"); });
        };
      });
      el("modalHost").querySelectorAll("[data-idle]").forEach(function (sel) {
        sel.onchange = function () {
          sel.disabled = true;
          api("/stores/" + encodeURIComponent(sel.dataset.idle) + "/prefs", { method: "POST", body: JSON.stringify({ idleLockSec: Number(sel.value) || 0 }) })
            .then(load).catch(function (e) { sel.disabled = false; toast(e.message || "Couldn't update"); });
        };
      });
      el("outCancel").onclick = function () { el("modalHost").innerHTML = ""; };
      el("outClear").onclick = function () {
        el("outId").value = ""; el("outName").value = ""; el("outAddr").value = "";
        el("outFormTitle").textContent = "Add an outlet"; el("outSave").textContent = "Add outlet"; el("outClear").style.display = "none";
      };
      el("outSave").onclick = function () {
        var name = el("outName").value.trim(); if (!name) return toast("Outlet name required");
        var body = { name: name, address: el("outAddr").value.trim() };
        var editing = !!el("outId").value; if (editing) body.id = el("outId").value;
        var sv = el("outSave"); sv.disabled = true;
        api("/stores", { method: "POST", body: JSON.stringify(body) })
          .then(function () { toast(editing ? "Outlet updated" : "Outlet added — it shares this menu"); load(); })
          .catch(function (e) { sv.disabled = false; toast(e.message || "Couldn't save"); });
      };
    }
    function load() { api("/stores").then(function (r) { draw(r.stores || [], r.defaultStoreId, r.prefs || {}); }).catch(function (e) { toast(e.message || "Couldn't load outlets"); }); }
    load();
  }

  /* Bulk restock every menu item to a quantity, or make them all
     always-available (stock-untracked, never "sold out"). Fixes a whole menu
     that has gone out of stock. Writes stock onto the products and syncs to the
     till + guest menu. */
  function openRestock() {
    var n = S.products.length;
    el("modalHost").innerHTML =
      '<div class="overlay" id="ov"><div class="modal" style="max-width:420px">' +
      '<h3 style="margin:0 0 4px">Restock all items</h3>' +
      '<p class="sub" style="margin:0 0 14px">Applies to all ' + n + ' menu items on the till and the guest menu.</p>' +
      '<label class="hint" style="display:block;margin-bottom:4px">Set stock quantity for every item</label>' +
      '<input id="rsQty" type="number" min="0" inputmode="numeric" value="50" style="width:100%;margin-bottom:12px" />' +
      '<label class="ao-toggle" style="display:flex;align-items:center;gap:9px;margin:4px 0 2px;font-size:13.5px;cursor:pointer"><input type="checkbox" id="rsClear" style="width:16px;height:16px;accent-color:var(--primary)" /> Make them always-available instead (don\'t track stock — never sold out)</label>' +
      '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">' +
      '<button class="ghost" id="rsClose">Cancel</button>' +
      '<button class="primary" id="rsSave">Apply</button></div>' +
      '</div></div>';
    el("rsClear").onchange = function () { el("rsQty").disabled = el("rsClear").checked; el("rsQty").style.opacity = el("rsClear").checked ? "0.5" : "1"; };
    el("rsClose").onclick = function () { el("modalHost").innerHTML = ""; };
    var sv = el("rsSave");
    sv.onclick = function () {
      var clear = el("rsClear").checked;
      var qty = Math.max(0, Math.round(Number(el("rsQty").value) || 0));
      sv.disabled = true;
      api("/products/restock", { method: "POST", body: JSON.stringify(clear ? { clear: true } : { qty: qty }) })
        .then(function (r) {
          el("modalHost").innerHTML = "";
          toast(clear ? "All items are now always-available" : "Restocked " + (r.count || n) + " items to " + qty);
          return loadAll();
        })
        .then(render)
        .catch(function (e) { sv.disabled = false; toast(e.message || "Couldn't restock"); });
    };
  }

  /* Two-level menu layout editor. Main categories (top nav row on the till and
     guest menu) each hold an ordered list of sub categories; products carry the
     sub category (`cat`). Owners can add / rename / delete / reorder mains,
     move & reorder subs between mains, add empty sub "buckets" to drop items
     into later, and assign any stray sub that isn't in a group yet.

     Working model: groups = [{name, subs:[{name, orig}]}]. `orig` is the sub's
     original category label (null for a brand-new empty bucket) — used to count
     items and to migrate product.cat when a sub is renamed. */
  function openMenuLayout() {
    var groups = (S.catGroups || []).map(function (g) {
      return { name: g.name, subs: (g.subs || []).map(function (s) { return { name: s, orig: s }; }) };
    });
    // count items per sub label (by original category on the products)
    function itemCount(orig) { if (!orig) return 0; return S.products.filter(function (p) { return p.cat === orig; }).length; }
    // present product categories that aren't placed in any group yet
    function unassigned() {
      var placed = {}; groups.forEach(function (g) { g.subs.forEach(function (s) { if (s.orig) placed[s.orig] = true; }); });
      var have = {}; S.products.forEach(function (p) { if (p.cat) have[p.cat] = true; });
      return Object.keys(have).filter(function (c) { return !placed[c]; }).sort();
    }
    function draw() {
      var gHtml = groups.map(function (g, gi) {
        var subRows = g.subs.map(function (s, si) {
          var n = itemCount(s.orig);
          return '<div style="display:flex;align-items:center;gap:6px;padding:6px 8px;border:1px solid var(--border);border-radius:10px;margin:5px 0;background:var(--panel)">' +
            '<input data-sname="' + gi + '.' + si + '" value="' + esc(s.name) + '" style="flex:1;min-width:0;padding:5px 7px;font-size:13px" />' +
            '<span class="badge dim" style="white-space:nowrap">' + n + '</span>' +
            '<button class="ghost tiny" data-sup="' + gi + '.' + si + '"' + (si === 0 ? " disabled" : "") + ' title="Move up">↑</button>' +
            '<button class="ghost tiny" data-sdn="' + gi + '.' + si + '"' + (si === g.subs.length - 1 ? " disabled" : "") + ' title="Move down">↓</button>' +
            (groups.length > 1 ? '<select data-smove="' + gi + '.' + si + '" title="Move to another main" style="max-width:96px;font-size:12px;padding:4px">' +
              '<option value="">move…</option>' + groups.map(function (gg, ggi) { return ggi === gi ? "" : '<option value="' + ggi + '">' + esc(gg.name) + '</option>'; }).join("") + '</select>' : '') +
            '<button class="ghost tiny" data-sdel="' + gi + '.' + si + '" title="Remove from this main">✕</button>' +
          '</div>';
        }).join("");
        return '<div style="border:1px solid var(--border);border-radius:14px;padding:11px 12px;margin-bottom:12px;background:var(--panel2)">' +
          '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">' +
          '<span style="color:var(--sub);font-weight:700;width:18px">' + (gi + 1) + '</span>' +
          '<input data-gname="' + gi + '" value="' + esc(g.name) + '" style="flex:1;min-width:0;font-weight:700;padding:6px 8px" title="Main category name" />' +
          '<button class="ghost tiny" data-gup="' + gi + '"' + (gi === 0 ? " disabled" : "") + ' title="Move up">↑</button>' +
          '<button class="ghost tiny" data-gdn="' + gi + '"' + (gi === groups.length - 1 ? " disabled" : "") + ' title="Move down">↓</button>' +
          '<button class="ghost tiny" data-gdel="' + gi + '" title="Delete this main (its sub categories become unassigned)">🗑</button>' +
          '</div>' +
          (subRows || '<div class="hint" style="margin:4px 0 2px">No sub categories yet.</div>') +
          '<div style="display:flex;gap:6px;margin-top:6px">' +
          '<input id="addSub' + gi + '" placeholder="+ Add a sub category" style="flex:1;padding:6px 8px;font-size:13px" />' +
          '<button class="ghost tiny" data-saddbtn="' + gi + '">Add</button></div>' +
        '</div>';
      }).join("");
      var un = unassigned();
      var unHtml = un.length ? '<div style="border:1px dashed var(--border);border-radius:12px;padding:10px 12px;margin-bottom:12px">' +
        '<div class="hint" style="margin:0 0 6px">Not in any main yet — pick a main category for each:</div>' +
        un.map(function (c) {
          return '<div style="display:flex;align-items:center;gap:6px;margin:5px 0">' +
            '<span style="flex:1">' + esc(c) + ' <span class="badge dim">' + itemCount(c) + '</span></span>' +
            '<select data-assign="' + esc(c) + '" style="font-size:12px;padding:4px"><option value="">assign to…</option>' +
            groups.map(function (gg, ggi) { return '<option value="' + ggi + '">' + esc(gg.name) + '</option>'; }).join("") + '</select></div>';
        }).join("") + '</div>' : "";
      el("modalHost").innerHTML =
        '<div class="overlay" id="ov"><div class="modal" style="max-width:560px;max-height:88vh;overflow:auto">' +
        '<h3 style="margin:0 0 4px">Menu layout</h3>' +
        '<p class="sub" style="margin:0 0 12px">Set up the two-row menu used on the till and the guest menu: main categories on top, their sub categories below. Renaming a sub category moves its items with it.</p>' +
        unHtml + gHtml +
        '<div style="display:flex;gap:6px;margin:10px 0 4px">' +
        '<input id="addMain" placeholder="+ Add a main category" style="flex:1;padding:7px 9px" />' +
        '<button class="ghost" id="addMainBtn">Add main</button></div>' +
        '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px">' +
        '<button class="ghost" id="cClose">Cancel</button>' +
        '<button class="primary" id="cSave">Save layout</button></div>' +
        '</div></div>';
      // keep any half-typed sub/main names when a structural button re-draws
      function syncNames() {
        el("modalHost").querySelectorAll("[data-gname]").forEach(function (i) { groups[+i.dataset.gname].name = i.value; });
        el("modalHost").querySelectorAll("[data-sname]").forEach(function (i) { var p = i.dataset.sname.split("."); groups[+p[0]].subs[+p[1]].name = i.value; });
      }
      function q(sel, fn) { el("modalHost").querySelectorAll(sel).forEach(fn); }
      q("[data-gup]", function (b) { b.onclick = function () { syncNames(); var i = +b.dataset.gup; var t = groups[i - 1]; groups[i - 1] = groups[i]; groups[i] = t; draw(); }; });
      q("[data-gdn]", function (b) { b.onclick = function () { syncNames(); var i = +b.dataset.gdn; var t = groups[i + 1]; groups[i + 1] = groups[i]; groups[i] = t; draw(); }; });
      q("[data-gdel]", function (b) { b.onclick = function () { syncNames(); groups.splice(+b.dataset.gdel, 1); draw(); }; });
      q("[data-sup]", function (b) { b.onclick = function () { syncNames(); var p = b.dataset.sup.split("."), g = groups[+p[0]].subs, i = +p[1]; var t = g[i - 1]; g[i - 1] = g[i]; g[i] = t; draw(); }; });
      q("[data-sdn]", function (b) { b.onclick = function () { syncNames(); var p = b.dataset.sdn.split("."), g = groups[+p[0]].subs, i = +p[1]; var t = g[i + 1]; g[i + 1] = g[i]; g[i] = t; draw(); }; });

      q("[data-smove]", function (sel) { sel.onchange = function () { if (sel.value === "") return; syncNames(); var p = sel.dataset.smove.split("."); var moved = groups[+p[0]].subs.splice(+p[1], 1)[0]; groups[+sel.value].subs.push(moved); draw(); }; });
      q("[data-saddbtn]", function (b) { b.onclick = function () { syncNames(); var gi = +b.dataset.saddbtn; var v = (el("addSub" + gi).value || "").trim(); if (!v) return; groups[gi].subs.push({ name: v, orig: null }); draw(); }; });
      q("[data-assign]", function (sel) { sel.onchange = function () { if (sel.value === "") return; syncNames(); var c = sel.dataset.assign; groups[+sel.value].subs.push({ name: c, orig: c }); draw(); }; });
      el("addMainBtn").onclick = function () { syncNames(); var v = (el("addMain").value || "").trim(); if (!v) return; groups.push({ name: v, subs: [] }); draw(); };
      el("cClose").onclick = function () { el("modalHost").innerHTML = ""; };
      var sv = el("cSave");
      sv.onclick = function () {
        syncNames();
        // build payload + rename map (orig -> new) for subs whose label changed
        var renames = {}, outGroups = [];
        groups.forEach(function (g) {
          var name = (g.name || "").trim(); if (!name) return;
          var subs = [];
          g.subs.forEach(function (s) {
            var nm = (s.name || "").trim(); if (!nm) return;
            if (s.orig && nm !== s.orig) renames[s.orig] = nm;
            subs.push(nm);
          });
          outGroups.push({ name: name, subs: subs });
        });
        sv.disabled = true;
        api("/category-groups", { method: "PUT", body: JSON.stringify({ groups: outGroups, renames: renames }) })
          .then(function () { el("modalHost").innerHTML = ""; toast("Menu layout saved — the till and guest menu will follow."); return loadAll(); })
          .then(render)
          .catch(function (e) { sv.disabled = false; toast(e.message || "Couldn't save"); });
      };
    }
    draw();
  }

  function recipeTotals() {
    var cost = S.recipe.lines.reduce(function (a, l) { return a + Math.round(l.qty * l.unitCost); }, 0);
    var price = S.recipe.price;
    return { cost: cost, price: price, profit: price - cost, pct: price > 0 ? Math.round((price - cost) / price * 1000) / 10 : 0 };
  }

  /* Downscale a chosen photo to a small JPEG data URI (max 512px, the same
     size the till uses) before it's stored on the product entity, so a full-res
     phone photo never bloats the sync stream. */
  function resizeImage(file, max, q, cb) {
    var reader = new FileReader();
    reader.onload = function () {
      var im = new Image();
      im.onload = function () {
        var s = Math.min(1, max / Math.max(im.width, im.height));
        var cv = document.createElement("canvas");
        cv.width = Math.round(im.width * s); cv.height = Math.round(im.height * s);
        cv.getContext("2d").drawImage(im, 0, 0, cv.width, cv.height);
        try { cb(cv.toDataURL("image/jpeg", q)); } catch (e) { toast("Couldn't process that image"); }
      };
      im.onerror = function () { toast("Couldn't read that image"); };
      im.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  /* Pull a web-hosted image into a compressed, self-contained data URI so the
     photo works offline. Draws it through a canvas (≤512px, JPEG q0.6), which
     both shrinks it and re-encodes it; needs the host to allow cross-origin
     reads (Unsplash and most CDNs do) — a blocked/failed image yields null so
     the caller keeps the original URL. */
  function urlToDataUri(url, cb) {
    var im = new Image();
    im.crossOrigin = "anonymous";
    im.onload = function () {
      try {
        var s = Math.min(1, 512 / Math.max(im.width, im.height));
        var cv = document.createElement("canvas");
        cv.width = Math.max(1, Math.round(im.width * s)); cv.height = Math.max(1, Math.round(im.height * s));
        cv.getContext("2d").drawImage(im, 0, 0, cv.width, cv.height);
        cb(cv.toDataURL("image/jpeg", 0.6));
      } catch (e) { cb(null); }
    };
    im.onerror = function () { cb(null); };
    im.src = url;
  }

  /* Options for a product's sub-category selector: every sub grouped under its
     main (from S.catGroups). If the item's current cat isn't in any group it is
     shown first as "(unassigned)" so nothing is silently lost. */
  function subcatOptions(current) {
    var groups = S.catGroups || [], seen = {}, html = "";
    groups.forEach(function (g) {
      if (!g.subs || !g.subs.length) return;
      html += '<optgroup label="' + esc(g.name) + '">';
      g.subs.forEach(function (s) { seen[s] = true; html += '<option value="' + esc(s) + '"' + (s === current ? " selected" : "") + '>' + esc(s) + "</option>"; });
      html += "</optgroup>";
    });
    if (current && !seen[current]) html = '<option value="' + esc(current) + '" selected>' + esc(current) + " (unassigned)</option>" + html;
    if (!current) html = '<option value="" selected>—</option>' + html;
    return html;
  }

          '<td class="mono"><input class="num" data-dq="' + i + '" inputmode="decimal" value="' + esc(l.qty) + '" style="width:80px" /></td>' +
          "<td>—</td>" +
          '<td class="mono"><input class="num" data-dc="' + i + '" inputmode="decimal" value="' + esc(l.cost) + '" placeholder="0.00" style="width:100px" /></td>' +
          '<td class="mono">—</td>' +
          '<td style="width:40px"><button class="tiny ghost" data-dx="' + i + '">✕</button></td></tr>';
      }
      var unitOpts = '<option value="">' + esc(ing.base_unit) + "</option>" + (ing.units || []).map(function (u) {
        return '<option value="' + esc(u.name) + '"' + (l.unitName === u.name ? " selected" : "") + ">" + esc(u.name) + "</option>";
      }).join("");
      var baseQty = (parseFloat(l.qty) || 0) * (l.unitName ? (ing.units.find(function (u) { return u.name === l.unitName; }) || { factor: 1 }).factor : 1);
      var per = baseQty > 0 && l.cost ? (parseFloat(l.cost) / baseQty).toFixed(4) : "—";
      return "<tr><td>" + (l.desc ? '<span class="badge dim">' + esc(l.desc) + "</span> " : "") + esc(ing.name) + "</td>" +
        '<td class="mono"><input class="num" data-dq="' + i + '" inputmode="decimal" value="' + esc(l.qty) + '" style="width:80px" /></td>' +
        '<td><select data-du="' + i + '">' + unitOpts + "</select></td>" +
        '<td class="mono"><input class="num" data-dc="' + i + '" inputmode="decimal" value="' + esc(l.cost) + '" placeholder="0.00" style="width:100px" /></td>' +
        '<td class="mono">' + qty3(baseQty) + " " + esc(ing.base_unit) + '<div class="hint">' + per + " /" + esc(ing.base_unit) + "</div></td>" +
        '<td style="width:40px"><button class="tiny ghost" data-dx="' + i + '">✕</button></td></tr>';
    }).join("");
    var addOpts = S.ingredients.map(function (i) { return '<option value="' + i.id + '">' + esc(i.name) + "</option>"; }).join("");
    var recent = S.invoices.slice(0, 12).map(function (v) {
      return "<tr><td>" + new Date(v.received_at).toLocaleDateString() + "</td><td>" + esc(v.supplier || "—") + "</td><td>" + esc(v.invoice_no || "—") + '</td><td class="mono">' + Y(v.total) + "</td></tr>";
    }).join("");
    var poCards = S.pos.map(function (po) {
      return '<div class="po-card">' +
        '<div class="meta"><b>' + esc(po.no || "PO") + "</b> · " + esc(po.supplier || "no supplier") +
        '<div class="hint">' + new Date(po.t).toLocaleDateString() + " · " + po.items.length + " line" + (po.items.length === 1 ? "" : "s") + " · " + esc(S.currency) + " " + Y(po.total) + "</div></div>" +
        '<button class="primary tiny" data-po="' + po.id + '" style="padding:8px 14px">Receive here</button></div>';
    }).join("");
    el("main").innerHTML =
      (poCards ? '<section><h2>Purchase orders from the till</h2><div class="panel">' + poCards + "</div>" +
        '<p class="hint">Raised at the till, waiting for delivery. Receiving here does everything in one tap: stock in, costs re-averaged, and the bill booked to the till\u2019s Expenses.</p></section>' : "") +
      '<section><div class="toolbar"><h2 style="margin:0">What arrived?</h2>' +
      '<div><input type="file" id="dScanFile" accept="image/*" capture="environment" style="display:none" />' +
      '<button class="ghost" id="dScan">📷 Scan a delivery note</button></div></div>' +
      '<div class="panel pad">' +
      '<div class="row2"><div><label>Supplier</label>' +
      (S.inv.poId
        ? '<div class="po-lock">' + esc(S.inv.supplierName || "From " + (S.inv.poNo || "PO")) + ' · <a href="#" id="dCancelPo">cancel</a></div>'
        : '<div style="display:flex;gap:8px"><select id="dSup" style="flex:1"><option value="">— pick a supplier —</option>' + supOpts + '</select><button class="ghost" id="dNewSup">+ New</button></div>') +
      "</div>" +
      '<div><label>Invoice number (optional)</label><input id="dNo" value="' + esc(S.inv.invoiceNo) + '" style="width:100%" /></div></div>' +
      '<div class="tbl-wrap" style="margin-top:14px"><table><thead><tr><th>Ingredient</th><th class="mono">Qty</th><th>Unit</th><th class="mono">Cost (' + esc(S.currency) + ')</th><th class="mono">Adds to stock</th><th></th></tr></thead><tbody>' +
      (lines || '<tr><td colspan="6" class="empty">No lines yet.</td></tr>') + "</tbody></table></div>" +
      '<div style="display:flex;gap:8px;align-items:center;margin-top:12px"><select id="dAdd" style="flex:1"><option value="">+ Add a delivery line…</option>' + addOpts + "</select>" +
      '<button class="primary" id="dPost"' + (S.inv.lines.length ? "" : " disabled") + ">Add to stock</button></div>" +
      '<p class="hint">Posting updates stock instantly, re-averages each ingredient\u2019s cost, and books the bill to the till\u2019s Expenses — enter it once, it lands everywhere.</p>' +
      "</div></section>" +
      "<section><h2>Recent deliveries</h2><div class=\"tbl-wrap\"><table><thead><tr><th>Date</th><th>Supplier</th><th>Invoice</th><th class=\"mono\">Total</th></tr></thead><tbody>" +
      (recent || '<tr><td colspan="4" class="empty">Nothing yet.</td></tr>') + "</tbody></table></div></section>";

    el("main").querySelectorAll("[data-po]").forEach(function (b) {
      b.onclick = function () {
        var po = S.pos.find(function (x) { return x.id === b.dataset.po; });
        if (!po) return;
        S.inv = { supplierId: "", invoiceNo: po.no, poId: po.id, poNo: po.no, supplierName: po.supplier,
          lines: po.items.map(function (it) {
            var match = S.ingredients.find(function (x) { return x.name.toLowerCase() === (it.desc || "").toLowerCase(); }) ||
                        S.ingredients.find(function (x) { return (it.desc || "").toLowerCase().includes(x.name.toLowerCase()) || x.name.toLowerCase().includes((it.desc || "").toLowerCase()); });
            return { ingredientId: match ? match.id : "", desc: it.desc, qty: String(it.qty || 1), unitName: "", cost: it.cost ? ((it.cost * (it.qty || 1)) / 100).toFixed(2) : "" };
          }) };
        renderDeliveries();
        toast(po.no + " loaded — check each line, then Add to stock");
      };
    });
    var cp = el("dCancelPo");
    if (cp) cp.onclick = function (e) { e.preventDefault(); S.inv = { supplierId: "", invoiceNo: "", lines: [] }; renderDeliveries(); };
    if (el("dSup")) el("dSup").onchange = function () { S.inv.supplierId = el("dSup").value; };
    el("dNo").oninput = function () { S.inv.invoiceNo = el("dNo").value; };
    el("dScan").onclick = function () { el("dScanFile").click(); };
    el("dScanFile").onchange = function () {
      var f = el("dScanFile").files && el("dScanFile").files[0];
      if (!f) return;
      if (f.size > 20 * 1024 * 1024) return toast("That photo is too large — try a smaller one.");
      var scanBtn = el("dScan"); scanBtn.disabled = true; scanBtn.textContent = "⏳ Reading…";
      var reader = new FileReader();
      reader.onload = function () {
        api("/ocr", { method: "POST", body: JSON.stringify({ image: reader.result }) })
          .then(function (r) {
            if (!r.configured) { toast(r.message || "Scanning isn't set up yet."); return; }
            if (!r.lines || !r.lines.length) { toast("Couldn't find any lines on that note — try a clearer photo."); return; }
            var matched = r.lines.filter(function (l) { return l.ingredientId; }).length;
            S.inv = { supplierId: "", invoiceNo: r.invoiceNo || "", lines: r.lines.map(function (l) {
              return { ingredientId: l.ingredientId || "", desc: l.description, qty: String(l.qty || ""), unitName: l.unitName || "", cost: l.cost ? (l.cost / 100).toFixed(2) : "" };
            }) };
            toast("Read " + r.lines.length + " line" + (r.lines.length === 1 ? "" : "s") + " · " + matched + " matched — check each, then Add to stock");
            renderDeliveries();
          })
          .catch(function (e) { toast(e.message); })
          .then(function () { var b = el("dScan"); if (b) { b.disabled = false; b.textContent = "📷 Scan a delivery note"; } });
      };
      reader.readAsDataURL(f);
    };
    if (el("dNewSup")) el("dNewSup").onclick = function () { supplierModal(null, function () { renderDeliveries(); }); };
    el("main").querySelectorAll("[data-dm]").forEach(function (sel) {
      sel.onchange = function () { S.inv.lines[Number(sel.dataset.dm)].ingredientId = sel.value; renderDeliveries(); };
    });
    el("dAdd").onchange = function () {
      if (!el("dAdd").value) return;
      S.inv.lines.push({ ingredientId: el("dAdd").value, qty: "", unitName: "", cost: "" });
      renderDeliveries();
    };
    el("main").querySelectorAll("[data-dq]").forEach(function (i) { i.oninput = function () { S.inv.lines[Number(i.dataset.dq)].qty = i.value; }; i.onchange = renderDeliveries; });
    el("main").querySelectorAll("[data-dc]").forEach(function (i) { i.oninput = function () { S.inv.lines[Number(i.dataset.dc)].cost = i.value; }; i.onchange = renderDeliveries; });
    el("main").querySelectorAll("[data-du]").forEach(function (s) { s.onchange = function () { S.inv.lines[Number(s.dataset.du)].unitName = s.value; renderDeliveries(); }; });
    el("main").querySelectorAll("[data-dx]").forEach(function (b) { b.onclick = function () { S.inv.lines.splice(Number(b.dataset.dx), 1); renderDeliveries(); }; });
    el("dPost").onclick = function () {
      var unmapped = S.inv.lines.filter(function (l) { return !l.ingredientId; }).length;
      if (unmapped) return toast("Match or remove " + unmapped + " PO line" + (unmapped === 1 ? "" : "s") + " first");
      var lines = S.inv.lines.map(function (l) { return { ingredientId: l.ingredientId, qty: parseFloat(l.qty) || 0, unitName: l.unitName, cost: Math.round((parseFloat(l.cost) || 0) * 100) }; })
        .filter(function (l) { return l.qty > 0; });
      if (!lines.length) return toast("Enter quantities first");
      el("dPost").disabled = true;
      var req = S.inv.poId
        ? api("/pos/" + encodeURIComponent(S.inv.poId) + "/receive", { method: "POST", body: JSON.stringify({ lines: lines, invoiceNo: S.inv.invoiceNo }) })
        : api("/invoices", { method: "POST", body: JSON.stringify({ supplierId: S.inv.supplierId, invoiceNo: S.inv.invoiceNo, lines: lines }) });
      req.then(function (r) {
        var wasPo = S.inv.poNo;
        S.inv = { supplierId: "", invoiceNo: "", lines: [] };
        toast((wasPo ? wasPo + " received — " : "Stock updated — ") + S.currency + " " + Y(r.total) + " booked to expenses");
        return loadAll();
      }).then(render).catch(function (e) { toast(e.message); el("dPost").disabled = false; });
    };
  }

  /* ── Suppliers tab ───────────────────────────────────────────────── */
  function renderSuppliers() {
    var rows = S.suppliers.map(function (s) {
      return "<tr><td>" + esc(s.name) + "</td><td>" + esc(s.phone || "—") + "</td><td>" + esc(s.email || "—") + "</td><td>" + esc(s.notes || "") + '</td><td><button class="tiny ghost" data-se="' + s.id + '">Edit</button></td></tr>';
    }).join("");
    el("main").innerHTML =
      '<div class="toolbar"><h2 style="margin:0">Suppliers</h2><button class="primary" id="addSup">+ New supplier</button></div>' +
      '<div class="tbl-wrap"><table><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Notes</th><th></th></tr></thead><tbody>' +
      (rows || '<tr><td colspan="5" class="empty">No suppliers yet.</td></tr>') + "</tbody></table></div>";
    el("addSup").onclick = function () { supplierModal(null, renderSuppliers); };
    el("main").querySelectorAll("[data-se]").forEach(function (b) {
      b.onclick = function () { supplierModal(S.suppliers.find(function (s) { return s.id === b.dataset.se; }), renderSuppliers); };
    });
  }

  function supplierModal(sup, after) {
    el("modalHost").innerHTML =
      '<div class="overlay" id="ov"><div class="modal"><h3>' + (sup ? "Edit supplier" : "New supplier") + "</h3>" +
      '<label>Name</label><input id="sName" value="' + esc(sup ? sup.name : "") + '" style="width:100%" />' +
      '<div class="row2"><div><label>Phone</label><input id="sPhone" value="' + esc(sup ? sup.phone : "") + '" style="width:100%" /></div>' +
      '<div><label>Email</label><input id="sEmail" value="' + esc(sup ? sup.email : "") + '" style="width:100%" /></div></div>' +
      '<label>Notes</label><input id="sNotes" value="' + esc(sup ? sup.notes : "") + '" style="width:100%" />' +
      '<div class="actions"><button class="ghost" id="sCancel">Cancel</button><button class="primary" id="sSave">Save</button></div></div></div>';
    el("ov").onclick = function (e) { if (e.target === el("ov")) el("modalHost").innerHTML = ""; };
    el("sCancel").onclick = function () { el("modalHost").innerHTML = ""; };
    el("sSave").onclick = function () {
      var body = { id: sup ? sup.id : undefined, name: el("sName").value.trim(), phone: el("sPhone").value.trim(), email: el("sEmail").value.trim(), notes: el("sNotes").value.trim() };
      if (!body.name) return toast("Supplier needs a name");
      api("/suppliers", { method: "POST", body: JSON.stringify(body) })
        .then(function () { el("modalHost").innerHTML = ""; toast(body.name + " saved"); return loadAll(); })
        .then(function () { render(); if (after) after(); }).catch(function (e) { toast(e.message); });
    };
  }

  /* ── Stock Check tab (guided wizard) ─────────────────────────────── */
  function renderAudit() {
    var open = S.audits.find(function (a) { return a.status === "open"; });
    if (S.wiz && S.wiz.result) return drawWizDone();
    if (open && (!S.wiz || S.wiz.session.id !== open.id)) {
      el("main").innerHTML = '<div class="empty">Loading stock check…</div>';
      return api("/audits/" + encodeURIComponent(open.id)).then(function (r) {
        var groups = Object.keys(r.byLocation).map(function (loc) { return { location: loc, lines: r.byLocation[loc] }; });
        S.wiz = { session: r.session, groups: groups, step: 0, entries: {} };
        groups.forEach(function (g) { g.lines.forEach(function (l) {
          if (l.counted !== null) S.wiz.entries[l.ingredientId] = { qty: String(l.counted), unitName: "", reason: l.reason || "" };
        }); });
        drawWizStep();
      }).catch(function (e) { toast(e.message); });
    }
    if (S.wiz) return S.wiz.step >= S.wiz.groups.length ? drawWizReview() : drawWizStep();

    var last = S.audits.find(function (a) { return a.status === "closed"; });
    var history = S.audits.filter(function (a) { return a.status === "closed"; }).slice(0, 10).map(function (a) {
      return "<tr><td>" + esc(a.label || "Stock check") + "</td><td>" + new Date(a.closed_at).toLocaleDateString() + '</td><td class="mono">' + Y(a.closing_value) + '</td><td class="mono">' + Y(a.cogs) + "</td></tr>";
    }).join("");
    el("main").innerHTML =
      '<section><div class="panel pad" style="text-align:center;padding:34px 18px">' +
      "<h3 style=\"margin:0 0 6px\">Weekly stock check</h3>" +
      '<p class="sub" style="color:var(--sub);font-size:13px;margin:0 0 18px">' +
      (last ? "Last check " + new Date(last.closed_at).toLocaleDateString() + " · your kitchen used " + esc(S.currency) + " " + Y(last.cogs) + " that period."
            : "Walk the store once a week, type what you see, and we’ll do the maths.") + "</p>" +
      '<button class="primary" id="wStart" style="padding:12px 26px">Start stock check</button>' +
      '<p class="hint" style="margin-top:12px">~' + S.ingredients.length + " items across " + [...new Set(S.ingredients.map(function (i) { return i.location; }))].join(" · ") + "</p>" +
      "</div></section>" +
      "<section><h2>Past checks</h2><div class=\"tbl-wrap\"><table><thead><tr><th>Check</th><th>Date</th><th class=\"mono\">Stock value counted</th><th class=\"mono\">Ingredients used</th></tr></thead><tbody>" +
      (history || '<tr><td colspan="4" class="empty">No checks yet — the first one sets your baseline.</td></tr>') + "</tbody></table></div></section>";
    el("wStart").onclick = function () {
      if (!S.ingredients.length) return toast("Add ingredients first");
      api("/audits", { method: "POST", body: JSON.stringify({ label: "Stock check — " + new Date().toLocaleDateString() }) })
        .then(function () { return api("/audits"); })
        .then(function (r) { S.audits = r.audits; S.wiz = null; renderAudit(); })
        .catch(function (e) { toast(e.message); });
    };
  }

  function entryBase(l) {
    var e = S.wiz.entries[l.ingredientId];
    if (!e || e.qty === "" || e.qty === undefined) return null;
    var f = 1;
    if (e.unitName) { var u = (l.units || []).find(function (x) { return x.name === e.unitName; }); f = u ? u.factor : 1; }
    return (parseFloat(e.qty) || 0) * f;
  }

  function drawWizStep() {
    var g = S.wiz.groups[S.wiz.step];
    var dots = "";
    for (var i = 0; i <= S.wiz.groups.length; i++) dots += '<i class="' + (i <= S.wiz.step ? "on" : "") + '"></i>';
    var rows = g.lines.map(function (l, idx) {
      var e = S.wiz.entries[l.ingredientId] || { qty: "", unitName: "" };
      var unitOpts = '<option value="">' + esc(l.baseUnit) + "</option>" + (l.units || []).map(function (u) {
        return '<option value="' + esc(u.name) + '"' + (e.unitName === u.name ? " selected" : "") + ">" + esc(u.name) + "</option>";
      }).join("");
      var base = entryBase(l);
      var d = base === null ? "" : Math.round((base - l.expected) * 1000) / 1000;
      var dCls = d === "" ? "" : d === 0 ? "zero" : d > 0 ? "up" : "down";
      var ingRef = ingById(l.ingredientId) || { units: l.units, base_unit: l.baseUnit };
      return "<tr><td>" + esc(l.name) + '<div class="hint">should be ' + friendlyQty(ingRef, l.expected) + "</div></td>" +
        '<td class="mono"><input class="num" data-wq="' + idx + '" inputmode="decimal" value="' + esc(e.qty) + '" placeholder="count" style="width:90px" /></td>' +
        '<td><select data-wu="' + idx + '">' + unitOpts + "</select></td>" +
        '<td class="mono">' + (d === "" ? '<span class="diff zero">—</span>' : '<span class="diff ' + dCls + '">' + (d > 0 ? "+" : "") + qty3(d) + " " + esc(l.baseUnit) + "</span>") + "</td></tr>";
    }).join("");
    el("main").innerHTML =
      '<div class="steps">' + dots + "</div>" +
      '<div class="toolbar"><h2 style="margin:0">' + esc(g.location) + ' <span style="text-transform:none;letter-spacing:0;color:var(--faint)">· step ' + (S.wiz.step + 1) + " of " + (S.wiz.groups.length + 1) + "</span></h2>" +
      "<div>" + (S.wiz.step > 0 ? '<button class="ghost" id="wBack">Back</button> ' : "") + '<button class="primary" id="wNext">Save &amp; continue</button></div></div>' +
      '<div class="tbl-wrap"><table><thead><tr><th>Item</th><th class="mono">You counted</th><th>Unit</th><th class="mono">Difference</th></tr></thead><tbody>' + rows + "</tbody></table></div>" +
      '<p class="hint">Count in whatever’s easiest — cases, bottles or ' + "base units — we convert. Leave blank anything you didn’t check.</p>" +
      '<p class="hint" style="margin-top:2px"><b>Difference</b> is your count minus what the system expected: a red number means you have less on the shelf than the records show (usually waste or a missed sale), green means more.</p>';
    g.lines.forEach(function (l, idx) {
      var qi = el("main").querySelector('[data-wq="' + idx + '"]'), ui = el("main").querySelector('[data-wu="' + idx + '"]');
      qi.oninput = function () {
        S.wiz.entries[l.ingredientId] = Object.assign(S.wiz.entries[l.ingredientId] || {}, { qty: qi.value, unitName: ui.value });
        var base = entryBase(l), cell = qi.closest("tr").lastElementChild;
        if (base === null) cell.innerHTML = '<span class="diff zero">—</span>';
        else { var d = Math.round((base - l.expected) * 1000) / 1000; cell.innerHTML = '<span class="diff ' + (d === 0 ? "zero" : d > 0 ? "up" : "down") + '">' + (d > 0 ? "+" : "") + qty3(d) + " " + esc(l.baseUnit) + "</span>"; }
      };
      ui.onchange = function () { S.wiz.entries[l.ingredientId] = Object.assign(S.wiz.entries[l.ingredientId] || { qty: "" }, { unitName: ui.value }); qi.oninput(); };
    });
    if (el("wBack")) el("wBack").onclick = function () { S.wiz.step--; drawWizStep(); };
    el("wNext").onclick = function () {
      saveCounts(g.lines).then(function () { S.wiz.step++; S.wiz.step >= S.wiz.groups.length ? drawWizReview() : drawWizStep(); }).catch(function (e) { toast(e.message); });
    };
  }

  function saveCounts(lines) {
    var counts = lines.map(function (l) {
      var e = S.wiz.entries[l.ingredientId];
      if (!e || e.qty === "" || e.qty === undefined) return null;
      return { ingredientId: l.ingredientId, qty: parseFloat(e.qty) || 0, unitName: e.unitName || "", reason: e.reason || undefined };
    }).filter(Boolean);
    if (!counts.length) return Promise.resolve();
    return api("/audits/" + encodeURIComponent(S.wiz.session.id) + "/counts", { method: "PUT", body: JSON.stringify({ counts: counts }) });
  }

  function drawWizReview() {
    var flagged = [];
    S.wiz.groups.forEach(function (g) { g.lines.forEach(function (l) {
      var base = entryBase(l);
      if (base === null) return;
      var v = base - l.expected;
      var pct = Math.abs(l.expected) > 0 ? Math.abs(v) / Math.abs(l.expected) * 100 : (v !== 0 ? 100 : 0);
      if (pct > 5) flagged.push({ l: l, v: v, pct: Math.round(pct * 10) / 10 });
    }); });
    var dots = "";
    for (var i = 0; i <= S.wiz.groups.length; i++) dots += '<i class="on"></i>';
    var rows = flagged.map(function (f, idx) {
      var e = S.wiz.entries[f.l.ingredientId] || {};
      return "<tr><td>" + esc(f.l.name) + '<div class="hint">' + esc(f.l.baseUnit) + "</div></td>" +
        '<td class="mono"><span class="diff ' + (f.v > 0 ? "up" : "down") + '">' + (f.v > 0 ? "+" : "") + qty3(f.v) + " (" + f.pct + "%)</span></td>" +
        '<td><div class="chips" data-fc="' + idx + '">' + REASONS.map(function (r) {
          return '<button data-r="' + r + '" class="' + (e.reason === r ? "on" : "") + '">' + r + "</button>";
        }).join("") + "</div></td></tr>";
    }).join("");
    el("main").innerHTML =
      '<div class="steps">' + dots + "</div>" +
      '<div class="toolbar"><h2 style="margin:0">Anything look off?</h2>' +
      '<div><button class="ghost" id="wBack">Back</button> <button class="primary" id="wClose">Finish stock check</button></div></div>' +
      (flagged.length
        ? '<div class="tbl-wrap"><table><thead><tr><th>Item</th><th class="mono">Difference</th><th>What happened?</th></tr></thead><tbody>' + rows + "</tbody></table></div>" +
          '<p class="hint">These are more than 5% off what the system expected. A quick reason keeps your reports honest — no adjustments to type.</p>'
        : '<div class="panel pad" style="text-align:center;padding:30px"><b>Everything matches 👌</b><div class="hint" style="margin-top:6px">All counts are within 5% of what the system expected.</div></div>');
    el("main").querySelectorAll("[data-fc]").forEach(function (div) {
      var f = flagged[Number(div.dataset.fc)];
      div.querySelectorAll("button").forEach(function (b) {
        b.onclick = function () {
          var e = S.wiz.entries[f.l.ingredientId];
          e.reason = e.reason === b.dataset.r ? "" : b.dataset.r;
          div.querySelectorAll("button").forEach(function (x) { x.classList.toggle("on", x.dataset.r === e.reason); });
        };
      });
    });
    el("wBack").onclick = function () { S.wiz.step = S.wiz.groups.length - 1; drawWizStep(); };
    el("wClose").onclick = function () {
      el("wClose").disabled = true;
      var all = []; S.wiz.groups.forEach(function (g) { all = all.concat(g.lines); });
      saveCounts(all)
        .then(function () { return api("/audits/" + encodeURIComponent(S.wiz.session.id) + "/close", { method: "POST", body: "{}" }); })
        .then(function (r) { S.wiz.result = r; return loadAll(); })
        .then(drawWizDone)
        .catch(function (e) { toast(e.message); el("wClose").disabled = false; });
    };
  }

  function drawWizDone() {
    var r = S.wiz.result;
    el("main").innerHTML =
      '<div class="panel bigstat"><div class="l">Cost of ingredients used since your last check</div>' +
      '<div class="n">' + esc(S.currency) + " " + Y(r.cogs) + "</div>" +
      '<div class="l" style="margin-top:10px;line-height:1.7">Stock value at last check <b>' + esc(S.currency) + " " + Y(r.openingValue) + "</b> + deliveries since <b>" + esc(S.currency) + " " + Y(r.purchasesValue) + "</b> − counted on shelves now <b>" + esc(S.currency) + " " + Y(r.closingValue) + "</b></div>" +
      (r.flaggedForReview ? '<div style="margin-top:12px"><span class="badge amber">' + r.flaggedForReview + " item(s) had notable differences</span></div>" : "") +
      '<div style="margin-top:20px"><button class="primary" id="wDone">Done</button></div></div>';
    el("wDone").onclick = function () { S.wiz = null; renderAudit(); };
  }

  /* ── "Open the till" ─────────────────────────────────────────────────
     The till bundle boots from a cloud pairing kept in localStorage, which
     only /login and /signup normally seed. On a device that signed in but
     never opened the till (this cookie, no pairing), /app would boot the
     bundle's baked-in demo store — so mint the pairing first via /api/pair,
     then navigate. Devices already paired go straight through. */
  document.querySelector(".till-link").addEventListener("click", function (e) {
    e.preventDefault();
    var go = function () { location.href = "/app"; };
    try { if (localStorage.getItem("kashikeyo-cloud")) return go(); } catch (err) {}
    fetch("/api/pair", { method: "POST" }).then(function (r) { return r.json(); }).then(function (d) {
      if (d && d.token) {
        try { localStorage.setItem("kashikeyo-cloud", JSON.stringify({ url: "", token: d.token, slug: d.slug, register: d.register })); } catch (err) {}
        if (d.pin) alert("Your till PIN is " + d.pin + " — you'll use it to sign in at the till. You can change it in Staff settings.");
      }
      go();
    }).catch(go);
  });

  el("signOut").addEventListener("click", function () {
    fetch("/api/logout", { method: "POST", keepalive: true }).catch(function () {});
    try { localStorage.removeItem("kashikeyo-cloud"); } catch (err) {}
    location.href = "/login";
  });

  /* ── shell interactions (mobile drawer) ──────────────────────────── */
  el("hamb").addEventListener("click", function () { S.navOpen = !S.navOpen; syncShell(); });
  el("scrim").addEventListener("click", function () { S.navOpen = false; syncShell(); });

  /* ── boot + background refresh ───────────────────────────────────── */
  applyTheme();
  loadAll().then(function () { render(); if (S.tab === "dash") loadSummary(); }).catch(function (e) {
    el("main").innerHTML = '<div class="empty">Couldn’t load the back office: ' + esc(e.message) + "</div>";
  });

  /* Other devices (the till, another phone) change data underneath us —
     quietly re-pull when it can't clobber in-progress work: no modal open,
     no stock-check underway, no delivery draft, no recipe being edited. */
  function safeToRefresh() {
    return document.visibilityState === "visible" &&
      !document.querySelector(".overlay") && !S.wiz &&
      !(S.inv.lines.length || S.inv.poId) &&
      !(S.tab === "recipes" && S.selProduct);
  }
  function bgRefresh() { if (safeToRefresh()) loadAll().then(render).catch(function () {}); }
  setInterval(bgRefresh, 60000);
  document.addEventListener("visibilitychange", bgRefresh);
})();
</script>
</body>
</html>
